    main {

      display: flex; flex-direction: column;
    }
    .artifact-meta {
      width: min(1380px, 97vw);
      margin: 0 auto;

        max(env(safe-area-inset-top), 10px)

      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
    }
    .artifact-title {
      margin: 0;
      font-size: clamp(.9rem, 2vw, 1.15rem);

      letter-spacing: .04em;

    }
    .artifact-right {
      display: flex;
      gap: 10px;

    }
    .meta-label {
      color: var(--muted);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .meta-link {
      color: var(--accent);
      font-size: .72rem;
      text-decoration: none;
      border: 1px solid var(--soft);
      padding: 3px 8px;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .meta-link:hover { color: var(--ink); border-color: rgba(255,255,255,.35); }
    .meta-nav {
      color: var(--muted);
      font-size: .72rem;
      text-decoration: none;
      border: 1px solid var(--soft);
      padding: 3px 8px;

      transition: color .15s, border-color .15s;

    </div>

</main>

<script>
(function(){
  var sf = document.querySelector('.sketch-frame');
  function pingFrame() {
    if (!sf) return;
    try {
      sf.contentWindow.dispatchEvent(new Event('resize'));
      sf.contentWindow.dispatchEvent(new Event('orientationchange'));
    } catch(e) {}
  }
  if (sf) sf.addEventListener('load', pingFrame, { once: true });
  window.addEventListener('resize', pingFrame, { passive: true });
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', pingFrame, { passive: true });
    window.visualViewport.addEventListener('scroll', pingFrame, { passive: true });
  }
  const contributorMenu = document.querySelector('.menu-group');
  if (!contributorMenu) return;
  contributorMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => { contributorMenu.open = false; });
  });
  document.addEventListener('click', event => {
    if (contributorMenu.open && !contributorMenu.contains(event.target)) contributorMenu.open = false;
  });
})();
</script>
