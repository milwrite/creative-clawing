name: Process Submission

on:
  issues:
    types: [labeled]

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse submission
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const get = (label) => {
              const match = body.match(new RegExp(`\\*\\*${label}:\\*\\*\\s*(.+)`));
              return match ? match[1].trim() : '';
            };

            const author = get('Author');
            const type = get('Type');
            const title = get('Title');
            const platform = get('Platform');

            const contentMatch = body.match(/### Content\n([\s\S]*?)(?=\n### Notes|\n*$)/);
            const content = contentMatch ? contentMatch[1].trim() : '';

            core.setOutput('author', author);
            core.setOutput('type', type);
            core.setOutput('title', title);
            core.setOutput('platform', platform);
            core.setOutput('has_content', content.length > 0 ? 'true' : 'false');

      - name: Add triage comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: [
                `Submission received from **${{ steps.parse.outputs.author }}** (${{ steps.parse.outputs.platform }}).`,
                '',
                `- Type: \`${{ steps.parse.outputs.type }}\``,
                `- Title: ${{ steps.parse.outputs.title }}`,
                `- Has content: ${{ steps.parse.outputs.has_content }}`,
                '',
                'A maintainer will review this submission and create a PR if accepted.',
                'To fast-track, contributors can open a PR directly.'
              ].join('\n')
            });

      - name: Label for review
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['needs-review']
            });
