name: Accessibility Audit

on:
  pull_request:
    paths:
      - 'gallery/**.html'
      - 'artifacts/**.html'
      - 'microblog/**.html'

permissions:
  contents: read
  pull-requests: write

jobs:
  a11y:
    name: Run a11y audit on changed artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout creative-clawing
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout a11y-checker
        uses: actions/checkout@v4
        with:
          repository: milwrite/quimbot
          sparse-checkout: |
            a11y-checker
          path: quimbot-tools
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install a11y-checker dependencies
        working-directory: quimbot-tools/a11y-checker
        run: npm ci

      - name: Install serve (local static server)
        run: npm install -g serve

      - name: Get changed HTML files
        id: changed
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(html)$' \
            | grep -E '^(gallery|artifacts|microblog)/' \
            > changed_files.txt || true
          echo "files=$(cat changed_files.txt | tr '\n' ' ')" >> $GITHUB_OUTPUT
          cat changed_files.txt

      - name: Start static server
        run: |
          serve . -p 8080 &
          sleep 2
        if: steps.changed.outputs.files != ''

      - name: Run a11y audit on changed files
        id: audit
        if: steps.changed.outputs.files != ''
        run: |
          REPORT=""
          TOTAL_VIOLATIONS=0
          FILES="${{ steps.changed.outputs.files }}"

          for f in $FILES; do
            echo "Auditing: $f"
            URL="http://localhost:8080/$f"
            OUTPUT=$(node quimbot-tools/a11y-checker/src/run-audit.js "$URL" /tmp/a11y-results 2>&1) || true
            VIOLATIONS=$(echo "$OUTPUT" | grep -oP '\d+ violations' | grep -oP '\d+' || echo "0")
            TOTAL_VIOLATIONS=$((TOTAL_VIOLATIONS + VIOLATIONS))

            # Extract violation summary lines
            SUMMARY=$(echo "$OUTPUT" | grep -E '^\s+(!!|!|-) ' | head -20 || echo "  No violations detected.")

            REPORT="${REPORT}
### \`${f}\`
<details>
<summary>${VIOLATIONS} violation(s) found</summary>

\`\`\`
${SUMMARY}
\`\`\`

</details>
"
          done

          echo "total_violations=$TOTAL_VIOLATIONS" >> $GITHUB_OUTPUT

          # Write full report to file (avoid multiline env var issues)
          cat > /tmp/a11y_report.md << 'REPORTEOF'
## ♿ Accessibility Audit Report

REPORTEOF
          echo "$REPORT" >> /tmp/a11y_report.md
          cat >> /tmp/a11y_report.md << REPORTEOF

---
**Total violations across changed files: ${TOTAL_VIOLATIONS}**

_Run by [a11y-checker](https://github.com/milwrite/quimbot/tree/main/a11y-checker) · WCAG 2.1 AA_
REPORTEOF

      - name: Post audit results as PR comment
        if: steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/a11y_report.md', 'utf8');
            const totalViolations = parseInt('${{ steps.audit.outputs.total_violations }}' || '0');

            // Find existing a11y comment to update rather than spam new ones
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.body.includes('♿ Accessibility Audit Report') &&
              c.user.type === 'Bot'
            );

            const body = report;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: No HTML files changed
        if: steps.changed.outputs.files == ''
        run: echo "No gallery/artifact/microblog HTML files changed — skipping audit."
