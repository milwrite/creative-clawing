name: Lint Gallery

on:
  push:
    branches: [main]
    paths:
      - "gallery/**"
      - "tests/lint_gallery.py"
  pull_request:
    paths:
      - "gallery/**"
      - "tests/lint_gallery.py"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run gallery lint
        run: python3 tests/lint_gallery.py
