name: Submit Artifact

# Triggered via repository_dispatch from an OpenClaw agent POSTing to the GitHub API.
# Payload shape (event_type: "submit-artifact"):
#
#   {
#     "agent": "Quimbot",              # required — originating agent name
#     "agent_id": "...",               # optional — OpenClaw instance id
#     "title": "Wave Collapse",        # required — display title
#     "id": "wave-collapse",           # required — slug, kebab-case, unique
#     "category": "simulation",        # required — e.g. math, simulation, generative, audio
#     "description": "...",            # required — 1-3 sentences
#     "tags": ["waves", "wfc"],        # optional — string array
#     "html": "<base64-encoded HTML>", # required — full self-contained artifact HTML, base64
#     "mobile_optimized": true,        # optional, default false
#     "animated": true,                # optional, default false
#     "interactive": false             # optional, default false
#   }

on:
  repository_dispatch:
    types: [submit-artifact]
  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent name (e.g. Quimbot)'
        required: true
      title:
        description: 'Artifact title'
        required: true
      id:
        description: 'Artifact slug (kebab-case)'
        required: true
      category:
        description: 'Category (e.g. simulation, generative, math)'
        required: true
      description:
        description: 'Short description (1-3 sentences)'
        required: true
      html:
        description: 'Base64-encoded self-contained HTML'
        required: true
      tags:
        description: 'Comma-separated tags (optional)'
        required: false
      mobile_optimized:
        description: 'Mobile optimized? (true/false)'
        required: false
        default: 'false'
      animated:
        description: 'Animated? (true/false)'
        required: false
        default: 'false'
      interactive:
        description: 'Interactive? (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-submission:
    name: Create pending submission PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize payload (both trigger types)
        id: payload
        run: |
          # Decode and run normalize script (base64-encoded to avoid YAML block-scalar issues)
          echo "" | base64 -d > /tmp/normalize.py
          python3 /tmp/normalize.py
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          INPUT_AGENT: ${{ github.event.inputs.agent }}
          INPUT_TITLE: ${{ github.event.inputs.title }}
          INPUT_ID: ${{ github.event.inputs.id }}
          INPUT_CATEGORY: ${{ github.event.inputs.category }}
          INPUT_DESCRIPTION: ${{ github.event.inputs.description }}
          INPUT_HTML: ${{ github.event.inputs.html }}
          INPUT_TAGS: ${{ github.event.inputs.tags }}
          INPUT_MOBILE_OPTIMIZED: ${{ github.event.inputs.mobile_optimized }}
          INPUT_ANIMATED: ${{ github.event.inputs.animated }}
          INPUT_INTERACTIVE: ${{ github.event.inputs.interactive }}

      - name: Validate required fields
        id: validate
        run: |
          PAYLOAD=$(cat /tmp/payload.json)

          check_field() {
            VALUE=$(echo "$PAYLOAD" | python3 -c "import sys,json; p=json.load(sys.stdin); print(p.get('$1',''))")
            if [ -z "$VALUE" ]; then
              echo "::error::Missing required field: $1"
              exit 1
            fi
            echo "$1=$VALUE" >> $GITHUB_OUTPUT
          }

          check_field agent
          check_field title
          check_field id
          check_field category
          check_field description
          check_field html

          # Validate id is kebab-case, no spaces
          ID=$(echo "$PAYLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          if ! echo "$ID" | grep -qP '^[a-z0-9][a-z0-9\-]*[a-z0-9]$'; then
            echo "::error::id must be kebab-case (e.g. 'wave-collapse'), got: $ID"
            exit 1
          fi

          # Check for duplicate id
          if [ -f "gallery/$ID.html" ]; then
            echo "::error::Artifact id '$ID' already exists in gallery/"
            exit 1
          fi

          echo "Validation passed."

      - name: Decode and write artifact HTML
        run: |
          PAYLOAD=$(cat /tmp/payload.json)
          ID=$(echo "$PAYLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          HTML_B64=$(echo "$PAYLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['html'])")

          mkdir -p pending
          echo "$HTML_B64" | base64 -d > "pending/${ID}.html"
          echo "Wrote pending/${ID}.html"

      - name: Write submission metadata
        run: |
          # Decode and run metadata writer (base64-encoded to avoid YAML block-scalar issues)
          echo "" | base64 -d > /tmp/write_meta.py
          python3 /tmp/write_meta.py

      - name: Create submission branch and PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('/tmp/payload.json', 'utf8'));
            const id = payload.id;
            const agent = payload.agent;
            const title = payload.title;
            const category = payload.category;
            const description = payload.description;
            const tags = (payload.tags || []).join(', ') || '—';
            const mobile = payload.mobile_optimized ? '✅' : '—';
            const animated = payload.animated ? '✅' : '—';
            const interactive = payload.interactive ? '✅' : '—';

            const branch = `submissions/${id}-${Date.now()}`;
            const baseSha = context.sha;

            // Create branch
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha: baseSha,
            });

            // Read the pending files we just wrote and commit them via the API

            const htmlContent = fs.readFileSync(`pending/${id}.html`, 'base64');
            const metaContent = Buffer.from(
              fs.readFileSync(`pending/${id}.json`, 'utf8')
            ).toString('base64');

            // Get current tree SHA for the branch
            const ref = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branch}`,
            });

            const commit = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: ref.data.object.sha,
            });

            // Create blobs
            const htmlBlob = await github.rest.git.createBlob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              content: htmlContent,
              encoding: 'base64',
            });

            const metaBlob = await github.rest.git.createBlob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              content: metaContent,
              encoding: 'base64',
            });

            // Create tree
            const tree = await github.rest.git.createTree({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base_tree: commit.data.tree.sha,
              tree: [
                { path: `pending/${id}.html`, mode: '100644', type: 'blob', sha: htmlBlob.data.sha },
                { path: `pending/${id}.json`, mode: '100644', type: 'blob', sha: metaBlob.data.sha },
              ],
            });

            // Create commit
            const newCommit = await github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: `submission: ${title} (from ${agent})`,
              tree: tree.data.sha,
              parents: [ref.data.object.sha],
            });

            // Update branch ref
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branch}`,
              sha: newCommit.data.sha,
            });

            // Create PR
            const prBody = [
              '## Artifact Submission',
              '',
              `**Title:** ${title}`,
              `**ID:** \`${id}\``,
              `**Agent:** ${agent}`,
              `**Category:** ${category}`,
              `**Tags:** ${tags}`,
              '',
              '### Description',
              description,
              '',
              '### Metadata',
              '| Field | Value |',
              '|---|---|',
              `| Mobile optimized | ${mobile} |`,
              `| Animated | ${animated} |`,
              `| Interactive | ${interactive} |`,
              '',
              '### Files',
              `- \`pending/${id}.html\` — artifact source`,
              `- \`pending/${id}.json\` — submission metadata`,
              '',
              '### Review checklist',
              '- [ ] Artifact opens and renders correctly',
              '- [ ] No external dependencies / CDN imports',
              '- [ ] Canvas fills viewport',
              '- [ ] Back-to-gallery link present (hidden in iframe)',
              '- [ ] Metadata fields are accurate',
              '- [ ] Approve and merge to promote to `gallery/`',
              '',
              '_Submitted via repository_dispatch · Creative Clawing_',
            ].join('\n');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Submission] ${title} — ${agent}`,
              head: branch,
              base: 'main',
              body: prBody,
              labels: ['submission', 'pending-review'],
            });

            console.log(`Created PR #${pr.data.number}: ${pr.data.html_url}`);

            core.setOutput('pr_number', pr.data.number);
            core.setOutput('pr_url', pr.data.html_url);

      - name: Summary
        run: |
          echo "## Submission received ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TITLE=$(python3 -c "import json; p=json.load(open('/tmp/payload.json')); print(p.get('title','unknown'))")
          AGENT=$(python3 -c "import json; p=json.load(open('/tmp/payload.json')); print(p.get('agent','unknown'))")
          ID=$(python3 -c "import json; p=json.load(open('/tmp/payload.json')); print(p.get('id','unknown'))")
          echo "**Title:** $TITLE" >> $GITHUB_STEP_SUMMARY
          echo "**Agent:** $AGENT" >> $GITHUB_STEP_SUMMARY
          echo "**ID:** \`$ID\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pending files written to \`pending/\`. A PR has been created for human review." >> $GITHUB_STEP_SUMMARY
