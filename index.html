  <style>
    main {
      width: min(1380px,97vw);
      margin: 0 auto;
      padding: 18px 0 60px;

    .intro {
      padding-bottom: 14px;

      gap: 4px;

      text-transform: lowercase;
    }
    .intro-animated {
      color: var(--muted);

      min-height: 1.2em;
    }
    .intro-animated .cursor {
      display: inline-block;
      width: 1px;
      height: .85em;
      background: var(--muted);
      margin-left: 1px;
      vertical-align: middle;
      animation: blink .9s step-end infinite;

      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }

    section {
      margin: 0 0 34px;
      scroll-margin-top: 132px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .section-head h2 {
      margin: 0;
      font-size: .95rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .section-title-link {
      color: inherit;
      text-decoration: none;
    }
    .section-title-link:hover { color: var(--ink); }
    .section-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .section-meta span {
      color: var(--muted);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .section-link {
      color: var(--muted);
      text-decoration: none;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border: 1px solid var(--soft);
      padding: 4px 8px;
      transition: color .15s, border-color .15s;
    }
    .section-link:hover {
      color: var(--ink);
      border-color: rgba(255,255,255,.35);
    }

    .lane-set { display: grid; gap: 10px; contain: layout style; }
    .lane {
      overflow: hidden;
      cursor: grab;
      touch-action: pan-y;
      contain: layout paint;
    }
    .lane.is-dragging { cursor: grabbing; }
    .lane-track {
      display: flex;
      gap: 10px;
      width: max-content;
      padding: 8px 0;
      --lane-cycle-x: -1px;
      --lane-duration: 60s;
      animation: lane-scroll-forward var(--lane-duration) linear infinite;
      animation-play-state: paused;
      will-change: transform;
      transform: translate3d(0,0,0);
      backface-visibility: hidden;
    }
    .lane-track[data-dir="-1"] { animation-name: lane-scroll-backward; }
    .lane.is-dragging .lane-track { animation: none; }
    @keyframes lane-scroll-forward {
      from { transform: translate3d(0,0,0); }
      to { transform: translate3d(var(--lane-cycle-x),0,0); }
    }
    @keyframes lane-scroll-backward {
      from { transform: translate3d(var(--lane-cycle-x),0,0); }
      to { transform: translate3d(0,0,0); }
    }

    .card {
      width: 220px;
      min-width: 220px;
      height: 220px;
      border: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-rows: 1fr auto;
      text-decoration: none;
      color: inherit;
      flex-shrink: 0;
      contain: layout paint;
    }
    .card-frame { position: relative; overflow: hidden; }
    .card-overlay { position: absolute; inset: 0; z-index: 1; touch-action: auto; }
    .card:hover { border-color: rgba(255,255,255,.35); }
    .recent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .recent-grid .card { width: auto; min-width: 0; height: 240px; contain: layout paint; }
    .card iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #0a0a0a;
      pointer-events: none;
      opacity: 0;
      transition: opacity .4s ease;
    }
    .card iframe.if-ready { opacity: 1; }
    .card-frame {
      background: #0a0a0a;
      background-position: center;
      background-size: cover;
      contain: layout paint;
    }
    .card-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.035), transparent 46%),
        #0a0a0a;
    }
    .card-frame:has(iframe)::before { opacity: 0; }
    .card-frame:has(iframe.poster-loader)::before { opacity: 1; }
    .card-frame.has-poster::before { opacity: 0; }
    .card-frame.has-fallback-poster::before { opacity: .22; }
    .card-frame iframe.poster-loader { opacity: 0; }
    .card-meta {
      border-top: 1px solid var(--soft);

    .blog-main-link {
      display: grid;
      grid-template-rows: auto auto;

      padding: 12px;

    .blog-meta {

    .contributor-card strong {

      border: 1px solid var(--soft);

    @media (prefers-reduced-motion: reduce) {
      .lane-track { animation: none !important; will-change: auto; }
    }
    @media (max-width: 700px) {
      section { scroll-margin-top: 120px; }
    }

<script>
(async function(){
  const el = document.getElementById('typewriter');

  let phrases = ['curating web artifacts', 'microblogging code snippets', 'drag or swipe lanes to explore'];
  try {
    const r = await fetch('data/taglines.json?t=' + Date.now(), { cache: 'no-store' });
    if (r.ok) phrases = await r.json();
  } catch (_) {}

  for (let i = phrases.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [phrases[i], phrases[j]] = [phrases[j], phrases[i]];
  }

  let pIdx = 0;
  let cIdx = 0;
  let typing = true;

  function tick() {
    const phrase = phrases[pIdx];
    if (typing) {
      cIdx++;
      el.textContent = phrase.slice(0, cIdx);
      if (cIdx >= phrase.length) {
        typing = false;
        setTimeout(tick, 1800);
        return;
      }
      setTimeout(tick, 60 + Math.random() * 45);
    } else {
      cIdx--;
      el.textContent = phrase.slice(0, cIdx);
      if (cIdx <= 0) {
        typing = true;
        pIdx = (pIdx + 1) % phrases.length;
        setTimeout(tick, 280);
        return;
      }
      setTimeout(tick, 35 + Math.random() * 18);
    }
  }
  setTimeout(tick, 900);
})();
</script>

<script>
(async function(){
  async function fetchJSON(url, fallback) {
    try {
      const sep = url.includes('?') ? '&' : '?';
      const res = await fetch(url + sep + 't=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error(String(res.status));
      return await res.json();
    } catch (_) {
      return fallback;
    }
  }

  const [feed, manifest] = await Promise.all([
    fetchJSON('data/feed.json', { artifacts: [] }),
    fetchJSON('data/manifest-v2.json', { artifacts: [], microblogs: [] })
  ]);

  function dedup(arr) {
    const seen = new Set();
    return arr.filter(item => {
      if (seen.has(item.id)) return false;
      seen.add(item.id);
      return true;
    });
  }

  const manifestArtMap = {};
  (manifest.artifacts || []).forEach(art => { manifestArtMap[art.id] = art; });

  let arts = dedup((feed.artifacts || []).map(art => ({ ...(manifestArtMap[art.id] || {}), ...art }))).filter(a => a.id !== 'index');
  if (!arts.length) arts = dedup((manifest.artifacts || []).filter(a => a.id !== 'index'));
  const blogs = dedup((manifest.microblogs || []).slice().sort((a, b) => {
    const da = a.date || '';
    const db = b.date || '';
    if (db !== da) return db < da ? -1 : 1;
    return b.num - a.num;
  }));

  const artMap = {};
  arts.forEach(art => { artMap[art.id] = art; });

  function artCard(art) {
    return `<a class="card" href="artifacts/${art.id}.html">
      <div class="card-frame" data-src="gallery/${art.id}.html" data-title="${art.title}">
        <div class="card-overlay"></div>
      </div>
      <div class="card-meta">
        <div class="ct">${art.title}</div>
      </div>
    </a>`;
  }

  function blogCard(blog) {
    const postHref = blog.url || `microblog/${blog.id}.html`;
    const chips = (blog.linkedArtifacts || []).slice(0, 2).map(id => {
      const art = artMap[id];
      const label = art ? art.title : id;
      return `<a class="art-chip" href="artifacts/${id}.html" title="View linked artifact">↗ ${label}</a>`;
    }).join('');

    const dateStr = blog.date
      ? new Date(blog.date + 'T12:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
      : '';

    return `<div class="blog-card">
      <a class="blog-main-link" href="${postHref}">
        <div class="blog-meta"><span class="k">${blog.originAgent || 'Microblog'}</span>${dateStr ? `<span class="blog-date">${dateStr}</span>` : ''}</div>
        <h3>${blog.title}</h3>
        <p>${blog.snippet || ''}</p>
      </a>
      ${chips ? `<div class="blog-art-row">${chips}</div>` : ''}
    </div>`;
  }

  // CSS animations drive lane scrolls, keeping the horizontal motion off the JS
  // frame loop even while preview iframes are warming up.
  const allLanes = [];
  const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
  let metricRefreshRaf = 0;

  function wrapPosition(pos, halfWidth) {
    if (!halfWidth) return 0;
    return ((pos % halfWidth) + halfWidth) % halfWidth;
  }

  function setLaneTransform(lane, pos) {
    lane.pos = wrapPosition(pos, lane.halfWidth);
    lane.track.style.transform = `translate3d(${-lane.pos}px,0,0)`;
  }

  function laneTransformX(track) {
    const transform = getComputedStyle(track).transform;
    if (!transform || transform === 'none') return 0;
    const values = transform.match(/matrix(3d)?\(([^)]+)\)/);
    if (!values) return 0;
    const parts = values[2].split(',').map(v => parseFloat(v.trim()));
    return values[1] ? (parts[12] || 0) : (parts[4] || 0);
  }

  function measureLaneCycle(lane) {
    const first = lane.track.children[0];
    const repeat = lane.track.children[lane.cycleStartIndex];
    if (first && repeat) {
      const cycleWidth = repeat.offsetLeft - first.offsetLeft;
      if (cycleWidth > 0) return cycleWidth;
    }
    return lane.track.scrollWidth / 2;
  }

  function refreshLaneMetrics() {
    metricRefreshRaf = 0;
    for (const lane of allLanes) {
      lane.halfWidth = measureLaneCycle(lane);
      lane.pos = wrapPosition(lane.pos, lane.halfWidth);
      configureLaneAnimation(lane, lane.pos);
    }
  }

  function scheduleLaneMetricRefresh() {
    if (metricRefreshRaf) return;
    metricRefreshRaf = requestAnimationFrame(refreshLaneMetrics);
  }

  function shouldRunLane(lane) {
    return !reducedMotionQuery.matches && lane.active && !lane.paused && lane.halfWidth > 0;
  }

  function updateLanePlayback(lane) {
    lane.track.style.animationPlayState = shouldRunLane(lane) ? 'running' : 'paused';
  }

  function configureLaneAnimation(lane, pos) {
    if (!lane.halfWidth) {
      updateLanePlayback(lane);
      return;
    }
    const speed = Math.max(1, Math.abs(lane.pxPerSec));
    const duration = lane.halfWidth / speed;
    const normalized = wrapPosition(pos, lane.halfWidth);
    const progress = lane.dir < 0 ? 1 - (normalized / lane.halfWidth) : normalized / lane.halfWidth;
    lane.pos = normalized;
    lane.track.style.setProperty('--lane-cycle-x', `${-lane.halfWidth}px`);
    lane.track.style.setProperty('--lane-duration', `${duration}s`);
    lane.track.style.animationDelay = `${-(duration * progress)}s`;
    lane.track.style.transform = '';
    updateLanePlayback(lane);
  }

  function makeLane(cards, speed, dir) {
    const lane = document.createElement('div');
    lane.className = 'lane';

    const track = document.createElement('div');
    track.className = 'lane-track';
    track.dataset.dir = dir < 0 ? '-1' : '1';
    // Duplicate cards for seamless infinite scroll
    track.innerHTML = cards.join('') + cards.join('');
    lane.appendChild(track);

    // Register with the compositor animation controller
    const laneState = {
      lane,
      track,
      pos: 0,
      halfWidth: 0,
      cycleStartIndex: cards.length,
      paused: false,
      active: true,
      dir,
      // px per second — consistent across 60Hz and 120Hz displays
      pxPerSec: speed * 60 * (dir < 0 ? -1 : 1),
    };
    lane.__laneState = laneState;
    allLanes.push(laneState);

    let dragStart = 0, scrollStart = 0, activePointerId = null, isDragging = false, dragMoved = false;
    const dragThreshold = 6;

    function onDown(e) {
      if (e.button !== undefined && e.button !== 0) return;
      laneState.pos = wrapPosition(-laneTransformX(track), laneState.halfWidth);
      laneState.paused = true;
      updateLanePlayback(laneState);
      setLaneTransform(laneState, laneState.pos);
      isDragging = true;
      dragMoved = false;
      activePointerId = e.pointerId;
      dragStart = e.clientX;
      scrollStart = laneState.pos;
      lane.classList.add('is-dragging');
      if (lane.setPointerCapture) lane.setPointerCapture(e.pointerId);
    }

    function onMove(e) {
      if (!isDragging || e.pointerId !== activePointerId) return;
      const dx = dragStart - e.clientX;
      if (Math.abs(dx) > dragThreshold) {
        dragMoved = true;
        e.preventDefault();
      }
      setLaneTransform(laneState, scrollStart + dx);
    }

    function onUp(e) {
      if (!isDragging || (e && e.pointerId !== activePointerId)) return;
      isDragging = false;
      activePointerId = null;
      lane.classList.remove('is-dragging');
      try {
        if (e && lane.releasePointerCapture) lane.releasePointerCapture(e.pointerId);
      } catch (_) {}
      configureLaneAnimation(laneState, laneState.pos);
      setTimeout(() => {
        if (!isDragging) {
          laneState.paused = false;
          configureLaneAnimation(laneState, laneState.pos);
        }
      }, 240);
    }

    lane.addEventListener('click', e => { if (dragMoved) { e.preventDefault(); e.stopPropagation(); dragMoved = false; } }, true);
    lane.addEventListener('pointerdown', onDown, { passive: false });
    lane.addEventListener('pointermove', onMove, { passive: false });
    lane.addEventListener('pointerup', onUp);
    lane.addEventListener('pointercancel', onUp);

    return lane;
  }

  // Build contributor data
  const contributorMap = {};
  function ensureContributor(name) {
    if (!contributorMap[name]) contributorMap[name] = { name, credited: 0, original: 0, artifacts: 0, microblogs: 0, linkedArtifacts: new Set() };
    return contributorMap[name];
  }
  function slugify(name) { return String(name || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, ''); }
  const contributorProfiles = manifest.summary?.agentProfiles || {};

  [...arts, ...blogs].forEach(item => {
    const type = item.type === 'artifact' || item.page?.startsWith('artifacts/') ? 'artifact' : 'microblog';
    const names = (item.contributors && item.contributors.length) ? item.contributors : [item.originAgent || 'Unknown'];
    names.forEach(name => {
      if (!name) return;
      const s = ensureContributor(name);
      s.credited++;
      if (type === 'artifact') s.artifacts++;
      if (type === 'microblog') s.microblogs++;
      if (item.originAgent === name) s.original++;
      (item.linkedArtifacts || []).forEach(id => s.linkedArtifacts.add(id));
    });
  });
  const contributors = Object.values(contributorMap).sort((a, b) => b.credited - a.credited || a.name.localeCompare(b.name));

  function contributorHTML() {
    return `<section id="section-contributors">
      <div class="section-head">
        <h2>Contributors</h2>
        <div class="section-meta"><span>${contributors.length} voices</span></div>
      </div>
      <div class="contributors-grid">${contributors.map(c => `
        <article class="contributor-card" id="contributor-${slugify(c.name)}">
          <div class="contributor-k">Contributor</div>
          <h3>${contributorProfiles[c.name] ? `<a class="contributor-name" href="${contributorProfiles[c.name]}">${c.name}</a>` : c.name}</h3>
          <p><strong>${c.original}</strong> origin works and <strong>${c.credited}</strong> documented credits across the site.</p>
          <div class="contributor-metrics">
            <span>${c.artifacts} artifacts</span>
            <span>${c.microblogs} microblogs</span>
            <span>${c.linkedArtifacts.size} linked sketches</span>
          </div>
          ${contributorProfiles[c.name] ? `<a class="contributor-link" href="${contributorProfiles[c.name]}">Open Profile</a>` : ''}
        </article>`).join('')}
      </div>
    </section>`;
  }

  // Staggered layout: 2 art lanes, 2 blog cards, contributors, repeat
  const container = document.getElementById('staggered');

  // ── Recently Added — top of page, 3 items ───────────────────
  const recentArts = [...arts]
    .sort((a, b) => (b.origin_date || '').localeCompare(a.origin_date || ''))
    .slice(0, 3);
  const recentSection = document.createElement('section');
  recentSection.id = 'section-recent';
  recentSection.style.cssText = 'margin:0 0 32px;padding:0 max(2vw,12px)';
  recentSection.innerHTML = `
    <h2 style="font-size:.85rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:0 0 14px;border-bottom:1px solid var(--line);padding-bottom:8px">Recently Added</h2>
    <div class="recent-grid">
      ${recentArts.map(artCard).join('')}
    </div>`;
  container.appendChild(recentSection);

  // Shuffle all artifacts then deal into groups of 8 — no repeats across lanes
  const shuffled = [...arts];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  // MIN_LANE_CARDS: 8 × 230px = 1840px > 1380px max viewport, so duplicates are never
  // simultaneously visible. Pad any short last group by cycling from the front of shuffled.
  const MIN_LANE_CARDS = 8;
  const artGroups = [];
  for (let i = 0; i < shuffled.length; i += MIN_LANE_CARDS) {
    const group = shuffled.slice(i, i + MIN_LANE_CARDS);
    let pad = 0;
    while (group.length < MIN_LANE_CARDS) {
      group.push(shuffled[pad % shuffled.length]);
      pad++;
    }
    artGroups.push(group);
  }

  // Shuffle blogs for variety on each visit
  for (let i = blogs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [blogs[i], blogs[j]] = [blogs[j], blogs[i]];
  }

  const blogGroups = [];
  for (let i = 0; i < blogs.length; i += 4) blogGroups.push(blogs.slice(i, i + 4));

  const speeds = [0.55, 0.42, 0.65, 0.48];
  let artIdx = 0, blogIdx = 0, laneIdx = 0;

  while (artIdx < artGroups.length || blogIdx < blogGroups.length) {
    // 2 artifact lanes
    for (let r = 0; r < 2 && artIdx < artGroups.length; r++, artIdx++, laneIdx++) {
      const wrap = document.createElement('div');
      wrap.className = 'lane-set';
      wrap.style.marginBottom = '10px';
      wrap.appendChild(makeLane(artGroups[artIdx].map(artCard), speeds[laneIdx % speeds.length], laneIdx % 2 ? -1 : 1));
      container.appendChild(wrap);
    }

    // blog cards
    if (blogIdx < blogGroups.length) {
      const group = blogGroups[blogIdx];
      const blogWrap = document.createElement('div');
      blogWrap.className = 'blog-stack';
      blogWrap.style.marginBottom = '20px';
      blogWrap.innerHTML = group.map(blogCard).join('');
      blogIdx++;
      container.appendChild(blogWrap);
    }
  }

  // Contributors after all lanes and blog cards
  const contribTemp = document.createElement('div');
  contribTemp.innerHTML = contributorHTML();
  container.appendChild(contribTemp.firstElementChild);

  scheduleLaneMetricRefresh();
  window.addEventListener('resize', scheduleLaneMetricRefresh, { passive: true });
  window.addEventListener('orientationchange', scheduleLaneMetricRefresh, { passive: true });
  if ('ResizeObserver' in window) {
    const laneResizeObserver = new ResizeObserver(scheduleLaneMetricRefresh);
    allLanes.forEach(lane => laneResizeObserver.observe(lane.track));
  }



  // Close contributor menu on outside click
  const contributorMenu = document.querySelector('.menu-group');
  if (contributorMenu) {
    contributorMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => { contributorMenu.open = false; });
    });
    document.addEventListener('click', event => {
      if (contributorMenu.open && !contributorMenu.contains(event.target)) contributorMenu.open = false;
    });
  }
  // Lazy-load and evict previews so only the nearest canvas iframes are live.
  const mobilePreviewQuery = window.matchMedia('(max-width: 760px)');
  const DRAIN_BATCH = 1;
  const PREVIEW_REFRESH_MS = 1600;
  const liveIframeFrames = new Set();
  const pendingFrames = new Set();
  const activePreviewRoots = new Set();
  const posterCache = new Map();
  let drainScheduled = false;
  let previewRefreshRaf = 0;
  let lastPreviewRefresh = 0;

  function liveIframeLimit() {
    if (reducedMotionQuery.matches) return 1;
    return mobilePreviewQuery.matches ? 2 : 4;
  }

  function frameDistanceFromViewport(f) {
    const r = f.getBoundingClientRect();
    const cx = r.left + (r.width / 2);
    const cy = r.top + (r.height / 2);
    const dx = cx - (window.innerWidth / 2);
    const dy = cy - (window.innerHeight / 2);
    const outsideX = Math.max(0, -r.right, r.left - window.innerWidth);
    const outsideY = Math.max(0, -r.bottom, r.top - window.innerHeight);
    return Math.hypot(dx, dy * 1.4) + (outsideX + outsideY) * 4;
  }

  function usesPosterPreview(f) {
    return f.classList.contains('card-frame');
  }

  function applyPoster(f, url) {
    f.style.backgroundImage = `url(${url})`;
    f.classList.add('has-poster');
    f.dataset.posterReady = '1';
  }

  function applyCachedPoster(f) {
    const url = posterCache.get(f.dataset.src);
    if (!url) return false;
    applyPoster(f, url);
    return true;
  }

  function canvasMetrics(canvas) {
    const sample = document.createElement('canvas');
    sample.width = 96;
    sample.height = 96;
    const sampleCtx = sample.getContext('2d', { willReadFrequently: true });
    sampleCtx.drawImage(canvas, 0, 0, sample.width, sample.height);
    const data = sampleCtx.getImageData(0, 0, sample.width, sample.height).data;
    let sum = 0;
    let sumSq = 0;
    let nonDark = 0;
    for (let i = 0; i < data.length; i += 4) {
      const v = (data[i] + data[i + 1] + data[i + 2]) / 3;
      sum += v;
      sumSq += v * v;
      if (v > 24) nonDark++;
    }
    const n = data.length / 4;
    const mean = sum / n;
    const variance = (sumSq / n) - (mean * mean);
    return { mean, variance, nonDarkRatio: nonDark / n };
  }

  function hasVisibleCanvasContent(metrics) {
    if (!metrics) return false;
    if (metrics.nonDarkRatio > 0.035) return true;
    if (metrics.nonDarkRatio > 0.006 && metrics.variance > 58) return true;
    return metrics.mean > 36 && metrics.variance > 8;
  }

  function fallbackPoster(f) {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220">
      <rect width="320" height="220" fill="#080808"/>
      <path d="M0 180 C70 118 126 236 214 102 S292 78 320 46" fill="none" stroke="#d7f29b" stroke-opacity=".45" stroke-width="2"/>
      <path d="M0 72 C82 114 122 10 204 78 S284 154 320 128" fill="none" stroke="#8eb8e8" stroke-opacity=".35" stroke-width="2"/>
    </svg>`;
    const url = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    posterCache.set(f.dataset.src, url);
    applyPoster(f, url);
    f.classList.add('has-fallback-poster');
  }

  function dispatchPreviewInput(iframe) {
    const win = iframe.contentWindow;
    const doc = iframe.contentDocument;
    const canvas = doc && doc.querySelector('canvas');
    if (!win || !doc || !canvas) return;

    try { win.dispatchEvent(new win.Event('resize')); } catch (_) {}
    const rect = canvas.getBoundingClientRect();
    const points = [
      [rect.left + rect.width * 0.50, rect.top + rect.height * 0.50],
      [rect.left + rect.width * 0.28, rect.top + rect.height * 0.35],
      [rect.left + rect.width * 0.72, rect.top + rect.height * 0.62],
    ];
    const originalSetPointerCapture = canvas.setPointerCapture;
    const originalReleasePointerCapture = canvas.releasePointerCapture;
    try { canvas.setPointerCapture = () => {}; } catch (_) {}
    try { canvas.releasePointerCapture = () => {}; } catch (_) {}
    try {
      points.forEach(([clientX, clientY], index) => {
        const opts = { bubbles: true, cancelable: true, clientX, clientY, pointerId: index + 1, button: 0, buttons: 1 };
        try { canvas.dispatchEvent(new win.PointerEvent('pointerdown', opts)); } catch (_) {}
        try { canvas.dispatchEvent(new win.MouseEvent('mousedown', opts)); } catch (_) {}
        try { canvas.dispatchEvent(new win.PointerEvent('pointermove', opts)); } catch (_) {}
        try { canvas.dispatchEvent(new win.MouseEvent('mousemove', opts)); } catch (_) {}
        try { canvas.dispatchEvent(new win.MouseEvent('click', opts)); } catch (_) {}
        try { canvas.dispatchEvent(new win.PointerEvent('pointerup', { ...opts, buttons: 0 })); } catch (_) {}
      });
    } finally {
      try { canvas.setPointerCapture = originalSetPointerCapture; } catch (_) {}
      try { canvas.releasePointerCapture = originalReleasePointerCapture; } catch (_) {}
    }
    try { doc.dispatchEvent(new win.KeyboardEvent('keydown', { bubbles: true, cancelable: true, key: ' ', code: 'Space' })); } catch (_) {}

    // Some artifacts expose their simulation controls as globals. Use them when
    // available so previews that normally need a tap can be captured after input.
    try { if (typeof win.resetSim === 'function') win.resetSim(); } catch (_) {}
    try { if (typeof win.cyclePreset === 'function') win.cyclePreset(); } catch (_) {}
    try { if (typeof win.cycleMode === 'function') win.cycleMode(); } catch (_) {}
    try { if (typeof win.seedMode === 'function') win.seedMode('target'); } catch (_) {}
    try { if (typeof win.excite === 'function') win.excite(100, 75, 24); } catch (_) {}
    try { if (typeof win.__creativeClawingPreview === 'function') win.__creativeClawingPreview(); } catch (_) {}
    try {
      if (typeof win.step === 'function') {
        for (let i = 0; i < 120; i++) win.step();
      }
    } catch (_) {}
    try {
      if (typeof win.integrate === 'function') {
        for (let i = 0; i < 240; i++) win.integrate();
      }
    } catch (_) {}
    try { if (typeof win.drawSim === 'function') win.drawSim(); } catch (_) {}
    try { if (typeof win.draw === 'function') win.draw(); } catch (_) {}
  }

  function capturePoster(f, iframe, finalize) {
    if (!iframe.isConnected) return true;
    if (f.dataset.posterReady === '1') {
      ejectFrame(f);
      scheduleDrain();
      return true;
    }
    let url = '';
    let bestMetrics = null;
    try {
      const doc = iframe.contentDocument;
      const canvases = doc ? [...doc.querySelectorAll('canvas')].filter(el => el.width > 0 && el.height > 0) : [];
      let bestCanvas = null;
      let bestScore = -Infinity;
      for (const canvas of canvases) {
        const metrics = canvasMetrics(canvas);
        const score = metrics.variance + (metrics.nonDarkRatio * 500);
        if (score > bestScore) {
          bestScore = score;
          bestCanvas = canvas;
          bestMetrics = metrics;
        }
      }
      if (bestCanvas && hasVisibleCanvasContent(bestMetrics)) url = bestCanvas.toDataURL('image/jpeg', 0.72);
    } catch (_) {}
    if (url && url.length > 128) {
      posterCache.set(f.dataset.src, url);
      document.querySelectorAll('.card-frame[data-src]').forEach(el => {
        if (usesPosterPreview(el) && el.dataset.src === f.dataset.src) applyPoster(el, url);
      });
      ejectFrame(f);
      scheduleDrain();
      return true;
    }
    if (!finalize) {
      dispatchPreviewInput(iframe);
      return false;
    }
    if (finalize) {
      fallbackPoster(f);
      ejectFrame(f);
      scheduleDrain();
    }
    return false;
  }

  function injectOneFrame(f) {
    if (usesPosterPreview(f) && (f.dataset.posterReady || applyCachedPoster(f))) return;
    if (f.querySelector('iframe')) return; // already live
    if (liveIframeFrames.size >= liveIframeLimit()) {
      pendingFrames.add(f);
      return;
    }
    pendingFrames.delete(f);
    const iframe = document.createElement('iframe');
    iframe.title = f.dataset.title || '';
    iframe.src = f.dataset.src;
    if (usesPosterPreview(f)) iframe.className = 'poster-loader';
    // sandbox removed — same-origin trusted artifacts
    iframe.addEventListener('load', () => {
      // Delay resize dispatch so the iframe canvas has painted dimensions.
      // On mobile, firing resize immediately hits a 0×0 canvas.
      // Two-shot: 80ms catches fast devices, 400ms catches slow mobile renderers.
      setTimeout(() => {
        try { iframe.contentWindow.dispatchEvent(new Event('resize')); } catch(e) {}
        iframe.classList.add('if-ready');
      }, 80);
      setTimeout(() => {
        try { iframe.contentWindow.dispatchEvent(new Event('resize')); } catch(e) {}
      }, 400);
      if (usesPosterPreview(f)) {
        setTimeout(() => dispatchPreviewInput(iframe), 180);
        setTimeout(() => capturePoster(f, iframe, false), 720);
        setTimeout(() => capturePoster(f, iframe, true), 1280);
      }
      scheduleDrain();
    }, { once: true });
    f.insertBefore(iframe, f.firstChild);
    liveIframeFrames.add(f);
  }

  function drainPendingBatch() {
    let loaded = 0;
    for (const f of pendingFrames) {
      if (liveIframeFrames.size >= liveIframeLimit() || loaded >= DRAIN_BATCH) break;
      pendingFrames.delete(f);
      injectOneFrame(f);
      loaded++;
    }
    drainScheduled = false;
    if (pendingFrames.size && liveIframeFrames.size < liveIframeLimit()) scheduleDrain();
  }

  function scheduleDrain() {
    if (drainScheduled) return;
    drainScheduled = true;
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => drainPendingBatch(), { timeout: 240 });
    } else {
      setTimeout(drainPendingBatch, 90);
    }
  }

  function ejectFrame(f) {
    const iframe = f.querySelector('iframe');
    if (!iframe) return;
    iframe.src = 'about:blank';
    iframe.remove();
    liveIframeFrames.delete(f);
  }

  function refreshPreviewFrames(ts) {
    previewRefreshRaf = 0;
    lastPreviewRefresh = ts || performance.now();
    const candidates = [...activePreviewRoots]
      .flatMap(el => [...el.querySelectorAll('.card-frame[data-src]')])
      .filter(f => f.isConnected)
      .sort((a, b) => frameDistanceFromViewport(a) - frameDistanceFromViewport(b));
    const keep = new Set();
    let loadSlots = 0;
    for (const f of candidates) {
      if (f.dataset.posterReady || applyCachedPoster(f)) {
        keep.add(f);
      } else if (loadSlots < liveIframeLimit()) {
        keep.add(f);
        loadSlots++;
      }
    }

    for (const f of liveIframeFrames) {
      if (!keep.has(f)) ejectFrame(f);
    }
    for (const f of pendingFrames) {
      if (!keep.has(f)) pendingFrames.delete(f);
    }
    for (const f of keep) {
      if (usesPosterPreview(f) && (f.dataset.posterReady || applyCachedPoster(f))) continue;
      if (!f.querySelector('iframe')) pendingFrames.add(f);
    }
    scheduleDrain();
  }

  function schedulePreviewRefresh() {
    if (previewRefreshRaf) return;
    previewRefreshRaf = requestAnimationFrame(refreshPreviewFrames);
  }
  setInterval(schedulePreviewRefresh, PREVIEW_REFRESH_MS);

  const laneObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      const lane = e.target.querySelector('.lane')?.__laneState;
      if (lane) {
        lane.active = e.isIntersecting;
        updateLanePlayback(lane);
      }
      if (e.isIntersecting) {
        activePreviewRoots.add(e.target);
      } else {
        activePreviewRoots.delete(e.target);
        e.target.querySelectorAll('.card-frame[data-src]').forEach(f => pendingFrames.delete(f));
        e.target.querySelectorAll('.card-frame[data-src]').forEach(ejectFrame);
      }
    });
    schedulePreviewRefresh();
  }, { rootMargin: '420px 0px' });
  document.querySelectorAll('.lane-set, #section-recent').forEach(el => laneObserver.observe(el));

  function scheduleResponsivePreviewRefresh() {
    scheduleLaneMetricRefresh();
    allLanes.forEach(updateLanePlayback);
    schedulePreviewRefresh();
  }
  function watchMediaQuery(query, callback) {
    if (query.addEventListener) query.addEventListener('change', callback);
    else if (query.addListener) query.addListener(callback);
  }
  watchMediaQuery(mobilePreviewQuery, scheduleResponsivePreviewRefresh);
  watchMediaQuery(reducedMotionQuery, scheduleResponsivePreviewRefresh);
  window.addEventListener('scroll', () => {
    if (performance.now() - lastPreviewRefresh > PREVIEW_REFRESH_MS) schedulePreviewRefresh();
  }, { passive: true });

  // Scroll to hash after dynamic content renders
  if (location.hash) {
    const target = document.querySelector(location.hash);
    if (target) target.scrollIntoView({ behavior: 'smooth' });
  }
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
