<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>creative clawing</title>
  <meta name="description" content="creative clawing gallery" />
  <style>
    :root {
      --bg: #090b10;
      --text: #eaf0ff;
      --muted: #9ba8c5;
      --line: rgba(142, 171, 255, 0.12);
      --line-strong: rgba(142, 171, 255, 0.2);
      --accent: #a9c8ff;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        linear-gradient(var(--line) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(90deg, var(--line) 1px, transparent 1px) 0 0 / 32px 32px,
        radial-gradient(circle at 20% 12%, rgba(143, 116, 255, 0.12), transparent 36%),
        radial-gradient(circle at 80% 84%, rgba(87, 167, 255, 0.12), transparent 40%),
        var(--bg);
      letter-spacing: 0.01em;
    }

    main {
      width: min(1140px, 94vw);
      margin: 0 auto;
      padding: 52px 0 64px;
    }

    h1 {
      margin: 0;
      font-weight: 560;
      font-size: clamp(1.4rem, 3vw, 2.1rem);
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 30px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line-strong);
    }

    .top a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 22px;
    }

    input[type="search"] {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line-strong);
      background: transparent;
      color: var(--text);
      padding: 8px 0;
      font-size: 0.95rem;
      outline: none;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .chip {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 6px 0;
      font-size: 0.82rem;
      cursor: pointer;
      border-bottom: 1px solid transparent;
    }

    .chip.active { color: var(--text); border-bottom-color: var(--line-strong); }

    .list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 26px 24px;
    }

    article { display: grid; gap: 8px; align-content: start; }

    .preview {
      width: 100%;
      aspect-ratio: 16 / 10;
      border: 0;
      display: block;
      background: rgba(0,0,0,.35);
    }

    h2 { margin: 0; font-size: 1rem; font-weight: 520; }
    p { margin: 0; color: var(--muted); font-size: 0.85rem; line-height: 1.4; }
    .meta { font-size: 0.75rem; color: #c5d3f3; opacity: 0.8; }
    article a { color: var(--accent); text-decoration: none; font-size: 0.84rem; }

    .empty { color: var(--muted); font-size: 0.9rem; margin-top: 10px; }

    footer {
      margin-top: 28px;
      border-top: 1px solid var(--line-strong);
      padding-top: 12px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    @media (max-width: 800px) {
      .controls { grid-template-columns: 1fr; }
      .chips { justify-content: flex-start; }
      .list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="top">
      <div>
        <h1>creative clawing</h1>
        <p class="sub">generative sketches and experiments</p>
      </div>
      <a href="https://github.com/milwrite/creative-clawing" target="_blank" rel="noopener">github</a>
    </section>

    <section class="controls">
      <input id="search" type="search" placeholder="search" />
      <div class="chips" id="chips"></div>
    </section>

    <section class="list" id="list"></section>
    <p id="empty" class="empty" style="display:none;">no matches</p>

    <footer>live artifacts link to milwrite.github.io/quimbot/gallery</footer>
  </main>

  <script>
    const items = [
      {name:'dna double helix', type:'simulation', desc:'depth-sorted backbone with tilt and zoom', url:'https://milwrite.github.io/quimbot/gallery/dna.html'},
      {name:'mondrian generator', type:'geometry', desc:'recursive subdivision with animated color transitions', url:'https://milwrite.github.io/quimbot/gallery/mondrian.html'},
      {name:'gray-scott', type:'simulation', desc:'reaction diffusion and emergent patterning', url:'https://milwrite.github.io/quimbot/gallery/grayscott.html'},
      {name:'voronoi', type:'geometry', desc:'distance partitions and moving cell boundaries', url:'https://milwrite.github.io/quimbot/gallery/voronoi.html'},
      {name:'chladni', type:'wave', desc:'standing-wave nodal patterns', url:'https://milwrite.github.io/quimbot/gallery/chladni.html'},
      {name:'lorenz attractor', type:'chaos', desc:'phase-space strange attractor', url:'https://milwrite.github.io/quimbot/gallery/lorenz.html'},
      {name:'boids', type:'simulation', desc:'flocking from local steering rules', url:'https://milwrite.github.io/quimbot/gallery/boids.html'},
      {name:'wolfram automaton', type:'automata', desc:'1d cellular automata with rule cycling', url:'https://milwrite.github.io/quimbot/gallery/wolfram.html'},
      {name:'marching squares', type:'field', desc:'real-time contour extraction', url:'https://milwrite.github.io/quimbot/gallery/marchingsquares.html'},
      {name:'maurer rose', type:'geometry', desc:'sampled polar rose star paths', url:'https://milwrite.github.io/quimbot/gallery/maurerrose.html'},
      {name:'scan drift', type:'signal', desc:'pointer-warped scanline interference', url:'https://milwrite.github.io/quimbot/gallery/scandrift.html'},
      {name:'ascii reactive', type:'audio', desc:'frequency-reactive unicode field', url:'https://milwrite.github.io/quimbot/gallery/asciireactive.html'}
    ];

    const tags = ['all', ...new Set(items.map(x => x.type))];
    let active = 'all';

    const chips = document.getElementById('chips');
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const search = document.getElementById('search');

    function renderChips() {
      chips.innerHTML = tags.map(t => `<button class="chip ${t===active?'active':''}" data-t="${t}">${t}</button>`).join('');
      [...chips.querySelectorAll('.chip')].forEach(btn => {
        btn.onclick = () => { active = btn.dataset.t; renderChips(); render(); };
      });
    }

    function render() {
      const q = search.value.trim().toLowerCase();
      const out = items.filter(i => {
        const t = active === 'all' || i.type === active;
        const m = !q || `${i.name} ${i.type} ${i.desc}`.toLowerCase().includes(q);
        return t && m;
      });

      list.innerHTML = out.map(i => `
        <article>
          <iframe class="preview" src="${i.url}" loading="lazy" title="${i.name}" referrerpolicy="no-referrer"></iframe>
          <h2>${i.name}</h2>
          <p>${i.desc}</p>
          <div class="meta">${i.type}</div>
          <a href="${i.url}" target="_blank" rel="noopener">open artifact ↗</a>
        </article>
      `).join('');

      empty.style.display = out.length ? 'none' : 'block';
    }

    search.addEventListener('input', render);
    renderChips();
    render();
  </script>
</body>
</html>
