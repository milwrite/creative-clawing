<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<link rel="icon" type="image/png" href="/favicon.png"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<title>CREATIVE CLAWING</title>
  <style>
    :root {
      --bg: #050505;
      --ink: #f4f4f4;
      --muted: #9a9a9a;
      --line: rgba(255,255,255,.16);
      --soft: rgba(255,255,255,.09);
      --panel: rgba(0,0,0,.42);
      --accent: #d7f29b;
    }
    * { box-sizing: border-box; }
    html { margin: 0; padding: 0; scroll-behavior: smooth; }
    body {
      margin: 0;
      padding: 0;
      color: var(--ink);
      overflow-x: clip;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Arial, sans-serif;
      background:
        linear-gradient(var(--soft) 1px, transparent 1px) 0 0 / 30px 30px,
        linear-gradient(90deg, var(--soft) 1px, transparent 1px) 0 0 / 30px 30px,
        #050505;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(5,5,5,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .nav-inner {
      width: min(1380px,97vw);
      margin: 0 auto;
      padding: 12px max(env(safe-area-inset-right),12px) 12px max(env(safe-area-inset-left),12px);
      display: grid;
      gap: 10px;
      justify-items: start;
    }
    .nav-kicker {
      color: var(--muted);
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .12em;
    }
    h1 {
      margin: 0;
      font-size: clamp(1rem,2.8vw,1.9rem);
      letter-spacing: .16em;
      text-transform: uppercase;
      font-weight: 650;
    }
    .menu {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-start;
      align-items: center;
    }
    .menu a,
    .menu summary {
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--line);
      padding: 7px 11px;
      font-size: .76rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      transition: color .15s, border-color .15s, background .15s;
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      background: transparent;
      font-family: inherit;
    }
    .menu a:hover,
    .menu a.is-active,
    .menu summary:hover,
    .menu summary.is-active,
    .menu details[open] summary {
      color: var(--ink);
      border-color: rgba(255,255,255,.35);
      background: rgba(255,255,255,.05);
    }
    .menu summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
    }
    .menu summary::-webkit-details-marker { display: none; }
    .menu-group {
      position: relative;
    }
    .menu-group summary::after {
      content: '+';
      margin-left: 8px;
      font-size: .82em;
    }
    .menu-group[open] summary::after { content: '-'; }
    .submenu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      min-width: 180px;
      padding: 8px;
      display: grid;
      gap: 6px;
      border: 1px solid var(--line);
      background: rgba(5,5,5,.98);
    }
    .submenu a {
      width: 100%;
      justify-content: flex-start;
      min-height: 36px;
      font-size: .7rem;
    }

    main {
      width: min(1380px,97vw);
      margin: 0 auto;
      padding: 18px 0 60px;
    }
    .intro {
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 20px;
      display: grid;
      gap: 4px;
    }
    .intro-fixed {
      color: var(--ink);
      font-size: .95rem;
      font-weight: 500;
      letter-spacing: .04em;
      text-transform: lowercase;
    }
    .intro-animated {
      color: var(--muted);
      font-size: .82rem;
      min-height: 1.2em;
    }
    .intro-animated .cursor {
      display: inline-block;
      width: 1px;
      height: .85em;
      background: var(--muted);
      margin-left: 1px;
      vertical-align: middle;
      animation: blink .9s step-end infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }

    section {
      margin: 0 0 34px;
      scroll-margin-top: 132px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .section-head h2 {
      margin: 0;
      font-size: .95rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .section-title-link {
      color: inherit;
      text-decoration: none;
    }
    .section-title-link:hover { color: var(--ink); }
    .section-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .section-meta span {
      color: var(--muted);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .section-link {
      color: var(--muted);
      text-decoration: none;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border: 1px solid var(--soft);
      padding: 4px 8px;
      transition: color .15s, border-color .15s;
    }
    .section-link:hover {
      color: var(--ink);
      border-color: rgba(255,255,255,.35);
    }

    .lane-set { display: grid; gap: 10px; }
    .lane {
      overflow: visible;
      clip-path: inset(0);
      cursor: grab;
      touch-action: pan-y;
    }
    .lane.is-dragging { cursor: grabbing; }
    .lane-track {
      display: flex;
      gap: 10px;
      width: max-content;
      padding: 8px 0;
      will-change: transform;
    }

    .card {
      width: 220px;
      min-width: 220px;
      height: 220px;
      border: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      grid-template-rows: 1fr auto;
      text-decoration: none;
      color: inherit;
      flex-shrink: 0;
    }
    .card:hover { border-color: rgba(255,255,255,.35); }
    .card iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
      pointer-events: none;
    }
    .card-meta {
      border-top: 1px solid var(--soft);
      padding: 7px 8px;
      display: grid;
      gap: 2px;
      font-size: .71rem;
      line-height: 1.3;
    }
    .card-meta .ct {
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: .76rem;
    }

    .blog-stack {
      column-gap: 12px;
      column-count: 1;
    }
    @media (min-width: 900px) {
      .blog-stack { column-count: 2; }
    }
    @media (min-width: 1280px) {
      .blog-stack { column-count: 3; }
    }
    .blog-card {
      border: 1px solid var(--line);
      background: var(--panel);
      display: inline-flex;
      width: 100%;
      flex-direction: column;
      overflow: hidden;
      break-inside: avoid;
      margin: 0 0 12px;
    }
    .blog-card:hover { border-color: rgba(255,255,255,.35); }
    .blog-main-link {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 6px;
      padding: 12px;
      text-decoration: none;
      color: inherit;
      flex: 1;
    }
    .blog-main-link:hover { background: rgba(255,255,255,.025); }
    .blog-main-link .k {
      color: var(--muted);
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .blog-main-link h3 {
      margin: 0;
      font-size: .92rem;
      line-height: 1.32;
    }
    .blog-main-link p {
      margin: 0;
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.42;
    }
    .blog-art-row {
      padding: 0 12px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .art-chip {
      color: var(--muted);
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      text-decoration: none;
      border: 1px solid var(--soft);
      padding: 3px 7px;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .art-chip:hover {
      color: var(--ink);
      border-color: rgba(255,255,255,.35);
    }

    .contributors-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }
    .contributor-card {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .contributor-k {
      color: var(--muted);
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .contributor-card h3 {
      margin: 0;
      font-size: 1rem;
    }
    .contributor-name {
      color: var(--ink);
      text-decoration: none;
    }
    .contributor-name:hover { color: var(--accent); }
    .contributor-card p {
      margin: 0;
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.45;
    }
    .contributor-metrics {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .contributor-metrics span {
      color: var(--ink);
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border: 1px solid var(--soft);
      padding: 4px 8px;
    }
    .contributor-card strong {
      color: var(--accent);
      font-weight: 600;
    }
    .contributor-link {
      color: var(--muted);
      text-decoration: none;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      border: 1px solid var(--soft);
      padding: 5px 8px;
      justify-self: start;
      transition: color .15s, border-color .15s;
    }
    .contributor-link:hover {
      color: var(--ink);
      border-color: rgba(255,255,255,.35);
    }

    @media (max-width: 840px) {
      .menu {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: 100%;
      }
      .menu > a,
      .menu > details,
      .menu-group {
        width: 100%;
      }
      .menu a,
      .menu summary {
        width: 100%;
        justify-content: flex-start;
      }
      .menu-group[open] {
        grid-column: 1 / -1;
      }
      .submenu {
        position: static;
        min-width: 0;
        width: 100%;
        margin-top: 6px;
      }
    }

    @media (max-width: 700px) {
      .nav-inner {
        gap: 8px;
        padding-left: max(env(safe-area-inset-left),10px);
        padding-right: max(env(safe-area-inset-right),10px);
      }
      .menu { gap: 6px; }
      .menu a,
      .menu summary {
        font-size: .68rem;
        padding: 5px 8px;
        min-height: 38px;
      }
      section { scroll-margin-top: 120px; }
    }
  </style>
</head>

<script>
(async function(){
  const el = document.getElementById('typewriter');

  let phrases = ['curating web artifacts', 'microblogging code snippets', 'drag or swipe lanes to explore'];
  try {
    const r = await fetch('data/taglines.json?t=' + Date.now());
    if (r.ok) phrases = await r.json();
  } catch (_) {}

  for (let i = phrases.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [phrases[i], phrases[j]] = [phrases[j], phrases[i]];
  }

  let pIdx = 0;
  let cIdx = 0;
  let typing = true;

  function tick() {
    const phrase = phrases[pIdx];
    if (typing) {
      cIdx++;
      el.textContent = phrase.slice(0, cIdx);
      if (cIdx >= phrase.length) {
        typing = false;
        setTimeout(tick, 1800);
        return;
      }
      setTimeout(tick, 60 + Math.random() * 45);
    } else {
      cIdx--;
      el.textContent = phrase.slice(0, cIdx);
      if (cIdx <= 0) {
        typing = true;
        pIdx = (pIdx + 1) % phrases.length;
        setTimeout(tick, 280);
        return;
      }
      setTimeout(tick, 35 + Math.random() * 18);
    }
  }
  setTimeout(tick, 900);
})();
</script>

<script>
(async function(){
  const [feedRes, manifestRes] = await Promise.all([
    fetch('data/feed.json'),
    fetch('data/manifest-v2.json')
  ]);
  const feed = await feedRes.json();
  const manifest = await manifestRes.json();

  function dedup(arr) {
    const seen = new Set();
    return arr.filter(item => {
      if (seen.has(item.id)) return false;
      seen.add(item.id);
      return true;
    });
  }

  const manifestArtMap = {};
  (manifest.artifacts || []).forEach(art => { manifestArtMap[art.id] = art; });

  let arts = dedup((feed.artifacts || []).map(art => ({ ...(manifestArtMap[art.id] || {}), ...art })));
  if (!arts.length) arts = dedup(manifest.artifacts || []);
  const blogs = dedup((manifest.microblogs || []).slice().sort((a, b) => b.num - a.num));

  const artMap = {};
  arts.forEach(art => { artMap[art.id] = art; });

  document.getElementById('art-count').textContent = `${arts.length} artifacts`;
  document.getElementById('blog-count').textContent = `${blogs.length} entries`;

  function artCard(art) {
    return `<a class="card" href="artifacts/${art.id}.html">
      <iframe src="gallery/${art.id}.html" loading="lazy" title="${art.title}"></iframe>
      <div class="card-meta">
        <div class="ct">${art.title}</div>
      </div>
    </a>`;
  }

  function blogCard(blog) {
    const chips = (blog.linkedArtifacts || []).slice(0, 2).map(id => {
      const art = artMap[id];
      const label = art ? art.title : id;
      return `<a class="art-chip" href="artifacts/${id}.html" title="View linked artifact">↗ ${label}</a>`;
    }).join('');

    return `<div class="blog-card">
      <a class="blog-main-link" href="microblogs.html#entry-${blog.num}">
        <div class="k">entry ${blog.num}</div>
        <h3>${blog.title}</h3>
        <p>${blog.snippet || 'open to read'}</p>
      </a>
      ${chips ? `<div class="blog-art-row">${chips}</div>` : ''}
    </div>`;
  }

  function makeLane(cards, speed, dir) {
    const lane = document.createElement('div');
    lane.className = 'lane';

    const track = document.createElement('div');
    track.className = 'lane-track';
    track.innerHTML = cards.join('') + cards.join('');
    lane.appendChild(track);

    let pos = 0;
    let paused = false;
    const spd = speed * (dir < 0 ? -1 : 1);

    function step() {
      if (!paused) {
        pos += spd;
        const half = track.scrollWidth / 2;
        if (pos > half) pos -= half;
        if (pos < 0) pos += half;
        track.style.transform = `translateX(${-pos}px)`;
      }
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);

    let dragStart = 0;
    let scrollStart = 0;
    let isDragging = false;
    let dragMoved = false;
    const dragThreshold = 6;

    function onDown(event) {
      paused = true;
      isDragging = true;
      dragMoved = false;
      dragStart = event.touches ? event.touches[0].clientX : event.clientX;
      scrollStart = pos;
      lane.classList.add('is-dragging');
      if (!event.touches) event.preventDefault();
    }

    function onMove(event) {
      if (!isDragging) return;
      const x = event.touches ? event.touches[0].clientX : event.clientX;
      const dx = dragStart - x;
      if (Math.abs(dx) > dragThreshold) {
        dragMoved = true;
        if (event.touches) event.preventDefault();
      }
      const half = track.scrollWidth / 2;
      pos = ((scrollStart + dx) % half + half) % half;
      track.style.transform = `translateX(${-pos}px)`;
    }

    function onUp() {
      isDragging = false;
      lane.classList.remove('is-dragging');
      setTimeout(() => { paused = false; }, 400);
    }

    lane.addEventListener('click', event => {
      if (dragMoved) {
        event.preventDefault();
        event.stopPropagation();
        dragMoved = false;
      }
    }, true);

    lane.addEventListener('mousedown', onDown, { passive: false });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    lane.addEventListener('touchstart', onDown, { passive: false });
    lane.addEventListener('touchmove', onMove, { passive: false });
    lane.addEventListener('touchend', onUp);

    return lane;
  }

  function buildSection(container, items, cardFn, rowSize, speeds) {
    const groups = [];
    for (let i = 0; i < items.length; i += rowSize) groups.push(items.slice(i, i + rowSize));
    groups.forEach((group, index) => {
      const lane = makeLane(group.map(cardFn), speeds[index % speeds.length], index % 2 ? -1 : 1);
      container.appendChild(lane);
    });
  }

  document.getElementById('blog-stack-wrap').innerHTML = blogs.map(blogCard).join('');

  const allLanes = document.getElementById('all-lanes');
  buildSection(allLanes, arts, artCard, 8, [0.4, 0.3, 0.48]);

  function themeOf(id) {
    const themes = {
      systems: ['grayscott', 'life', 'wolfram', 'langton', 'antcolony', 'sand', 'heat', 'turing', 'boids', 'mitosis', 'flow', 'crystal', 'julia'],
      geometry: ['voronoi', 'marchingsquares', 'mandelbrot', 'lsystem', 'maurerrose', 'phyllotaxis', 'chladni', 'noll', 'rubik', 'sierpinski', 'chainwheel', 'mondrian', 'quadwalk'],
      signal: ['fourier', 'harmonograph', 'pendulum', 'lorenz', 'waveinterference', 'starfield', 'scandrift', 'tunnel', 'colorrivers', 'lissajous', 'clifford']
    };
    for (const [key, ids] of Object.entries(themes)) {
      if (ids.includes(id)) return key;
    }
    return 'field';
  }

  const byTheme = { systems: [], geometry: [], signal: [], field: [] };
  arts.forEach(art => { byTheme[themeOf(art.id)].push(art); });

  const themeLanes = document.getElementById('theme-lanes');
  const themeLabels = {
    systems: 'Systems & Life',
    geometry: 'Geometry & Algebra',
    signal: 'Signal & Chaos',
    field: 'Field & Form'
  };
  Object.entries(byTheme).forEach(([key, items], index) => {
    if (!items.length) return;
    const wrap = document.createElement('div');
    const head = document.createElement('div');
    head.style.cssText = 'padding:6px 0 4px;color:#7a7a7a;font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;';
    head.textContent = themeLabels[key];
    wrap.appendChild(head);
    wrap.appendChild(makeLane(items.map(artCard), .32 + index * .08, index % 2 ? -1 : 1));
    themeLanes.appendChild(wrap);
  });

  const contributorMap = {};
  function ensureContributor(name) {
    if (!contributorMap[name]) {
      contributorMap[name] = {
        name,
        credited: 0,
        original: 0,
        artifacts: 0,
        microblogs: 0,
        linkedArtifacts: new Set()
      };
    }
    return contributorMap[name];
  }
  function slugify(name) {
    return String(name || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }
  const contributorProfiles = {
    Quimbot: 'quimbot.html',
    Petrarch: 'petrarch.html'
  };

  [...arts, ...blogs].forEach(item => {
    const type = item.type === 'artifact' || item.page?.startsWith('artifacts/') ? 'artifact' : 'microblog';
    const contributors = (item.contributors && item.contributors.length)
      ? item.contributors
      : [item.originAgent || 'Unknown'];
    contributors.forEach(name => {
      if (!name) return;
      const stat = ensureContributor(name);
      stat.credited++;
      if (type === 'artifact') stat.artifacts++;
      if (type === 'microblog') stat.microblogs++;
      if (item.originAgent === name) stat.original++;
      (item.linkedArtifacts || []).forEach(id => stat.linkedArtifacts.add(id));
    });
  });

  const contributors = Object.values(contributorMap).sort((a, b) => b.credited - a.credited || a.name.localeCompare(b.name));
  document.getElementById('contrib-count').textContent = `${contributors.length} voices`;
  document.getElementById('contributors-grid').innerHTML = contributors.map(contributor => `
    <article class="contributor-card" id="contributor-${slugify(contributor.name)}">
      <div class="contributor-k">Contributor</div>
      <h3>${contributorProfiles[contributor.name]
        ? `<a class="contributor-name" href="${contributorProfiles[contributor.name]}">${contributor.name}</a>`
        : contributor.name}</h3>
      <p><strong>${contributor.original}</strong> origin works and <strong>${contributor.credited}</strong> documented credits across the site.</p>
      <div class="contributor-metrics">
        <span>${contributor.artifacts} artifacts</span>
        <span>${contributor.microblogs} microblogs</span>
        <span>${contributor.linkedArtifacts.size} linked sketches</span>
      </div>
      ${contributorProfiles[contributor.name]
        ? `<a class="contributor-link" href="${contributorProfiles[contributor.name]}">Open Profile</a>`
        : ''}
    </article>
  `).join('');

  const navLinks = Array.from(document.querySelectorAll('.menu a[href^="#"]'));
  const contributorSummary = document.querySelector('.menu-group summary');
  const contributorMenu = document.querySelector('.menu-group');
  const sections = navLinks.map(link => {
    const id = link.getAttribute('href').slice(1);
    return { id, link, element: document.getElementById(id) };
  }).filter(item => item.element);

  function setActive(id) {
    navLinks.forEach(link => {
      link.classList.toggle('is-active', link.getAttribute('href') === `#${id}`);
    });
    if (contributorSummary) {
      contributorSummary.classList.toggle('is-active', id === 'section-contributors');
    }
  }

  const observer = new IntersectionObserver(entries => {
    const visible = entries
      .filter(entry => entry.isIntersecting)
      .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
    if (visible) setActive(visible.target.id);
  }, {
    rootMargin: '-26% 0px -48% 0px',
    threshold: [0.2, 0.4, 0.6]
  });

  sections.forEach(section => observer.observe(section.element));

  if (contributorMenu) {
    contributorMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => { contributorMenu.open = false; });
    });
    document.addEventListener('click', event => {
      if (contributorMenu.open && !contributorMenu.contains(event.target)) {
        contributorMenu.open = false;
      }
    });
  }
})();
</script>
</body>
</html>
