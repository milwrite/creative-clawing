<!DOCTYPE html>
<html lang="en">
<head>
<style>.back-btn,#back,#info,#ui{display:none!important}</style>
<script>if(window.self===window.top)document.documentElement.classList.add('standalone')</script>
<style>html.standalone .back-btn,html.standalone #back,html.standalone #info,html.standalone #ui{display:revert!important}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Mohr Hypercube</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100dvh;background:#080808;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
canvas{display:block;width:100%;height:100%;touch-action:none;cursor:pointer}
#ui{
  position:fixed;
  bottom:max(16px,env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%);
  color:#3a3a3a;
  font-size:11px;
  text-align:center;
  pointer-events:none;
  line-height:1.8;
  white-space:nowrap;
}
#back{
  position:fixed;
  top:max(14px,env(safe-area-inset-top));
  left:max(14px,env(safe-area-inset-left));
  color:#555;
  text-decoration:none;
  font-size:11px;
  border:1px solid #1e1e1e;
  padding:5px 11px;
  min-height:44px;
  min-width:44px;
  display:flex;
  align-items:center;
  border-radius:4px;
  transition:color .15s,border-color .15s;
  z-index:100;
}
#back:hover{color:#bbb;border-color:#444}
#back:active{color:#ddd;border-color:#666}
@media(max-width:600px){
  html.standalone body{display:flex;flex-direction:column}
  html.standalone canvas{flex:1;min-height:0;height:auto}
  html.standalone #ui{
    position:relative;
    flex-shrink:0;
    bottom:auto;
    left:auto;
    transform:none;
    display:flex;
    justify-content:center;
    padding:10px 12px max(12px,env(safe-area-inset-bottom));
    font-size:12px;
    white-space:normal;
    text-align:center;
    pointer-events:none;
    background:rgba(8,8,8,0.95);
    border-top:1px solid #1a1a1a;
  }
  html.standalone #back{font-size:12px;padding:8px 14px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"><span id="mode-label">slow drift</span> &nbsp;·&nbsp; tap to cycle</div>
<a href="../" id="back">← gallery</a>
<script>
(function(){
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const modeLabel=document.getElementById('mode-label');
const DPR=Math.min(window.devicePixelRatio||1,2);

let W=0,H=0;
function resize(){
  const rect=canvas.getBoundingClientRect();
  W=rect.width||window.innerWidth;
  H=rect.height||window.innerHeight;
  canvas.width=Math.round(W*DPR);
  canvas.height=Math.round(H*DPR);
}
window.addEventListener('resize',()=>{ setTimeout(resize,50); });
if(window.visualViewport) window.visualViewport.addEventListener('resize',()=>{ setTimeout(resize,50); });
window.addEventListener('orientationchange',()=>{ setTimeout(resize,200); });

// ── 4D hypercube geometry ─────────────────────────────────
// 16 vertices: all combinations of (±1, ±1, ±1, ±1)
const verts4=[];
for(let i=0;i<16;i++){
  verts4.push([
    (i&1)?1:-1,
    (i&2)?1:-1,
    (i&4)?1:-1,
    (i&8)?1:-1
  ]);
}

// 32 edges: connect vertices differing in exactly one bit
const edges=[];
for(let i=0;i<16;i++){
  for(let j=i+1;j<16;j++){
    const diff=i^j;
    if(diff&&(diff&(diff-1))===0) edges.push([i,j]);
  }
}

// ── rotation modes ────────────────────────────────────────
const MODES=[
  {planes:[['XZ',0.0031],['YW',0.0047]],name:'slow drift'},
  {planes:[['XW',0.0055],['YZ',0.0039]],name:'crossing planes'},
  {planes:[['XZ',0.0088],['XW',0.0061]],name:'coupled spin'},
  {planes:[['YW',0.0029],['ZW',0.0073]],name:'w-axis wander'},
];

let modeIdx=0;
let t=0;

function cycleMode(){
  modeIdx=(modeIdx+1)%MODES.length;
  modeLabel.textContent=MODES[modeIdx].name;
}

canvas.addEventListener('click',cycleMode);
canvas.addEventListener('touchend',(e)=>{
  e.preventDefault();
  cycleMode();
},{passive:false});

// ── 4D rotation ───────────────────────────────────────────
function rot4(v,plane,angle){
  const[x,y,z,w]=v;
  const c=Math.cos(angle),s=Math.sin(angle);
  switch(plane){
    case 'XY': return[x*c-y*s,x*s+y*c,z,w];
    case 'XZ': return[x*c-z*s,y,x*s+z*c,w];
    case 'XW': return[x*c-w*s,y,z,x*s+w*c];
    case 'YZ': return[x,y*c-z*s,y*s+z*c,w];
    case 'YW': return[x,y*c-w*s,z,y*s+w*c];
    case 'ZW': return[x,y,z*c-w*s,z*s+w*c];
  }
  return v;
}

// ── perspective projections ───────────────────────────────
function proj4to3(v,d4=2.8){
  const[x,y,z,w]=v;
  const s=d4/(d4-w);
  return[x*s,y*s,z*s];
}

function proj3to2(v,d3=3.5){
  const[x,y,z]=v;
  const s=d3/(d3-z);
  return[x*s,y*s,s];
}

// ── draw ──────────────────────────────────────────────────
function draw(){
  t++;
  const mode=MODES[modeIdx];

  const rotated=verts4.map(v=>{
    let r=v;
    for(const[plane,speed] of mode.planes){
      r=rot4(r,plane,t*speed);
    }
    return r;
  });

  const scale=Math.min(W,H)*0.32*DPR;
  const cx=(W/2)*DPR, cy=(H/2)*DPR;

  const pts2d=rotated.map(v=>{
    const v3=proj4to3(v);
    const[px,py,ps]=proj3to2(v3);
    return{x:cx+px*scale,y:cy+py*scale,s:ps};
  });

  ctx.fillStyle='#080808';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(const[a,b] of edges){
    const pa=pts2d[a],pb=pts2d[b];
    const avgS=(pa.s+pb.s)*0.5;
    const alpha=Math.min(0.9,Math.max(0.08,(avgS-0.5)*0.7));
    const lw=Math.max(0.4*DPR,(avgS-0.4)*1.1*DPR);
    const bright=Math.round(140+avgS*55);
    ctx.strokeStyle=`rgba(${bright},${bright-4},${bright-10},${alpha})`;
    ctx.lineWidth=lw;
    ctx.beginPath();
    ctx.moveTo(pa.x,pa.y);
    ctx.lineTo(pb.x,pb.y);
    ctx.stroke();
  }

  for(const p of pts2d){
    const r=Math.max(1*DPR,(p.s-0.4)*2.2*DPR);
    const bright=Math.round(120+p.s*60);
    ctx.fillStyle=`rgba(${bright},${bright-6},${bright-14},${Math.min(0.85,(p.s-0.5)*1.2)})`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

window.__creativeClawingPreview = function warmupPreview() {
  modeIdx = 2;
  modeLabel.textContent = MODES[modeIdx].name;
  t = Math.max(t, 180);
  resize();
};
if (window.self !== window.top) {
  requestAnimationFrame(() => setTimeout(window.__creativeClawingPreview, 160));
}

// Defer first resize so flex layout paints before reading dimensions
requestAnimationFrame(()=>{
  resize();
  draw();
  setTimeout(resize,200);
});
})();
</script>
</body>
</html>
