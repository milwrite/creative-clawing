<!DOCTYPE html>
<html lang="en">
<head>
<style>.back-btn,#back,#info,#ui{display:none!important}</style>
<script>if(window.self===window.top)document.documentElement.classList.add('standalone')</script>
<style>html.standalone .back-btn,html.standalone #back,html.standalone #info,html.standalone #ui{display:revert!important}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Mohr Hypercube</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100dvh;background:#080808;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
canvas{display:block;width:100%;height:100%;touch-action:none;cursor:pointer}
#ui{
  position:fixed;
  bottom:max(16px,env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%);
  color:#3a3a3a;
  font-size:11px;
  text-align:center;
  pointer-events:none;
  line-height:1.8;
  white-space:nowrap;
}
#back{
  position:fixed;
  top:max(14px,env(safe-area-inset-top));
  left:max(14px,env(safe-area-inset-left));
  color:#555;
  text-decoration:none;
  font-size:11px;
  border:1px solid #1e1e1e;
  padding:5px 11px;
  min-height:44px;
  min-width:44px;
  display:flex;
  align-items:center;
  border-radius:4px;
  transition:color .15s,border-color .15s;
  z-index:100;
}
#back:hover{color:#bbb;border-color:#444}
#back:active{color:#ddd;border-color:#666}
@media(max-width:600px){
  html.standalone body{display:flex;flex-direction:column}
  html.standalone canvas{flex:1;min-height:0;height:auto}
  html.standalone #ui{
    position:relative;
    flex-shrink:0;
    bottom:auto;
    left:auto;
    transform:none;
    display:flex;
    justify-content:center;
    padding:10px 12px max(12px,env(safe-area-inset-bottom));
    font-size:12px;
    white-space:normal;
    text-align:center;
    pointer-events:none;
    background:rgba(8,8,8,0.95);
    border-top:1px solid #1a1a1a;
  }
  html.standalone #back{font-size:12px;padding:8px 14px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"><span id="mode-label">slow drift</span> &nbsp;·&nbsp; tap to cycle</div>
<a href="./" id="back">← gallery</a>
<script type="module">
import { mountMohr } from './_factories/mohr.js';

mountMohr({
  canvas: document.getElementById('c'),
  modeLabel: document.getElementById('mode-label'),
});
</script>
</body>
</html>
