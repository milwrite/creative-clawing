<!DOCTYPE html>
<html lang="en">

<title>Sprott Attractors</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#080810;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}
.back-btn{position:fixed;top:calc(12px + env(safe-area-inset-top));right:calc(12px + env(safe-area-inset-right));background:rgba(20,20,30,0.85);border:1px solid #334;color:#c0c8e0;padding:8px 14px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;text-decoration:none;backdrop-filter:blur(8px);z-index:1000;transition:border-color 0.2s}
.back-btn:hover{border-color:#6080ff}
.panel{position:fixed;top:calc(12px + env(safe-area-inset-top));left:calc(12px + env(safe-area-inset-left));background:rgba(8,8,16,0.82);border:1px solid #223;color:#a0b0d0;padding:12px 14px;border-radius:8px;font:12px/1.6 ui-monospace,monospace;backdrop-filter:blur(10px);z-index:100;max-width:min(320px,calc(100vw - 24px));pointer-events:none}
.panel .name{font-size:14px;font-weight:600;color:#c0d0ff;margin-bottom:4px}
.panel .eq{font-size:10px;line-height:1.8;color:#7090b0;white-space:pre}
.controls{position:fixed;bottom:calc(12px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:100}
.controls button{background:rgba(12,12,24,0.88);border:1px solid #334;color:#a0b8d8;padding:9px 18px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;backdrop-filter:blur(8px);transition:border-color 0.2s,color 0.2s;min-width:44px;min-height:44px}
.controls button:hover{border-color:#6080ff;color:#c0d0ff}
.controls button.active{border-color:#6080ff;color:#8090ff}
</style>
</head>
<body>
<a href="../" class="back-btn">← Gallery</a>
<canvas id="c"></canvas>
<div class="panel" id="panel">
  <div class="name" id="sysname">Thomas</div>
  <div class="eq" id="syseq"></div>
</div>
<div class="controls">
  <button id="btnPrev">prev</button>
  <button id="btnNext">next</button>
  <button id="btnReset">reset</button>
  <button id="btnRotate" class="active">rotate</button>
</div>
<script>
const SYSTEMS = [
  {
    name: 'Thomas',
    eq: 'ẋ = sin(y) − 0.208186·x\nẏ = sin(z) − 0.208186·y\nż = sin(x) − 0.208186·z',
    init: [0.1, 0, 0],
    scale: 0.22,
    fn: (x,y,z) => [Math.sin(y)-0.208186*x, Math.sin(z)-0.208186*y, Math.sin(x)-0.208186*z]
  },
  {
    name: 'Dadras',
    eq: 'ẋ = y − 3x + 2.7yz\nẏ = 1.7y − xz + z\nż = 2xy − 9z',
    init: [1, 2, 3],
    scale: 0.18,
    fn: (x,y,z) => [y-3*x+2.7*y*z, 1.7*y-x*z+z, 2*x*y-9*z]
  },
  {
    name: 'Halvorsen',
    eq: 'ẋ = −1.4x − 4y − 4z − y²\nẏ = −1.4y − 4z − 4x − z²\nż = −1.4z − 4x − 4y − x²',
    init: [-5, 0, 1],
    scale: 0.13,
    fn: (x,y,z) => [-1.4*x-4*y-4*z-y*y, -1.4*y-4*z-4*x-z*z, -1.4*z-4*x-4*y-x*x]
  },
  {
    name: 'Sprott B',
    eq: 'ẋ = yz\nẏ = x − y\nż = 1 − xy',
    init: [0.1, 0.1, 0.1],
    scale: 0.42,
    fn: (x,y,z) => [y*z, x-y, 1-x*y]
  },
  {
    name: 'Sprott C',
    eq: 'ẋ = yz\nẏ = x − y\nż = 1 − x²',
    init: [0.1, 0.1, 0.1],
    scale: 0.45,
    fn: (x,y,z) => [y*z, x-y, 1-x*x]
  },
  {
    name: 'Aizawa',
    eq: 'ẋ = (z−0.7)x − 3.5y\nẏ = 3.5x + (z−0.7)y\nż = 0.6 + 0.95z − z³/3\n    − (x²+y²)(1+0.25z) + 0.1z·x³',
    init: [0.1, 1, 0.01],
    scale: 0.85,
    fn: (x,y,z) => [(z-0.7)*x-3.5*y, 3.5*x+(z-0.7)*y, 0.6+0.95*z-z*z*z/3-(x*x+y*y)*(1+0.25*z)+0.1*z*x*x*x]
  },
  {
    name: 'Sprott D',
    eq: 'ẋ = −y\nẏ = x + z\nż = xz + 3y²',
    init: [0, 0, 1],
    scale: 0.38,
    fn: (x,y,z) => [-y, x+z, x*z+3*y*y]
  },
  {
    name: 'Four-Wing',
    eq: 'ẋ = 0.2x + yz\nẏ = 0.01y − xz\nż = −xy − z',
    init: [1, 1, 1],
    scale: 0.5,
    fn: (x,y,z) => [0.2*x+y*z, 0.01*y-x*z, -x*y-z]
  },
  {
    name: 'Linz-Sprott',
    eq: 'ẋ = y\nẏ = −x + yz\nż = 1 − y²',
    init: [0.1, 0, 0],
    scale: 0.55,
    fn: (x,y,z) => [y, -x+y*z, 1-y*y]
  }
];

const c = document.getElementById('c'), ctx = c.getContext('2d');
let W, H, dpr;
const MAX_TRAIL = 60000;
let trail = [];
let px = 0, py = 0, pz = 0;
let sysIdx = 0;
let rotX = 0.4, rotY = 0.3;
let autoRotate = true;
let autoAngle = 0;
let animId;

function resize() {
  dpr = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  c.width = W * dpr; c.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function resetSystem() {
  const sys = SYSTEMS[sysIdx];
  px = sys.init[0] + (Math.random()-0.5)*0.001;
  py = sys.init[1] + (Math.random()-0.5)*0.001;
  pz = sys.init[2] + (Math.random()-0.5)*0.001;
  trail = [];
  // warm-up
  const dt = 0.004;
  for (let i = 0; i < 2000; i++) {
    [px,py,pz] = rk4(sys.fn, px, py, pz, dt);
    if (!isFinite(px)||!isFinite(py)||!isFinite(pz)) {
      px=sys.init[0]; py=sys.init[1]; pz=sys.init[2];
    }
  }
  updatePanel();
}

function updatePanel() {
  const sys = SYSTEMS[sysIdx];
  document.getElementById('sysname').textContent = sys.name;
  document.getElementById('syseq').textContent = sys.eq;
}

function rk4(fn, x, y, z, dt) {
  const [k1x,k1y,k1z] = fn(x,y,z);
  const [k2x,k2y,k2z] = fn(x+dt/2*k1x, y+dt/2*k1y, z+dt/2*k1z);
  const [k3x,k3y,k3z] = fn(x+dt/2*k2x, y+dt/2*k2y, z+dt/2*k2z);
  const [k4x,k4y,k4z] = fn(x+dt*k3x, y+dt*k3y, z+dt*k3z);
  return [
    x + dt/6*(k1x+2*k2x+2*k3x+k4x),
    y + dt/6*(k1y+2*k2y+2*k3y+k4y),
    z + dt/6*(k1z+2*k2z+2*k3z+k4z)
  ];
}

function project(x, y, z) {
  // Rotation around Y axis then X axis
  const ry = autoRotate ? autoAngle : rotY;
  const cosY = Math.cos(ry), sinY = Math.sin(ry);
  const rx = rotX;
  const cosX = Math.cos(rx), sinX = Math.sin(rx);

  const x1 = x*cosY - z*sinY;
  const z1 = x*sinY + z*cosY;
  const y1 = y*cosX - z1*sinX;

  const scale = SYSTEMS[sysIdx].scale * Math.min(W, H) * 0.45;
  return [W/2 + x1*scale, H/2 + y1*scale];
}

let frameCount = 0;
function frame() {
  animId = requestAnimationFrame(frame);
  const sys = SYSTEMS[sysIdx];
  const dt = 0.004;
  const stepsPerFrame = 4;

  // Fade background
  ctx.fillStyle = 'rgba(8,8,16,0.05)';
  ctx.fillRect(0, 0, W, H);

  if (autoRotate) autoAngle += 0.003;

  // Integrate
  for (let s = 0; s < stepsPerFrame; s++) {
    [px,py,pz] = rk4(sys.fn, px, py, pz, dt);
    if (!isFinite(px)||!isFinite(py)||!isFinite(pz)) { resetSystem(); return; }
    trail.push([px, py, pz]);
    if (trail.length > MAX_TRAIL) trail.shift();
  }

  // Draw trail
  const len = trail.length;
  if (len < 2) return;

  // Draw in segments for color gradient
  const segSize = 200;
  for (let i = 1; i < len; i++) {
    const t = i / len;
    // Hue: head=cyan/blue, tail=purple/red  (age coloring)
    const hue = 200 + t * 200; // 200 (blue) to 400 (red, wraps to purple)
    const alpha = 0.15 + t * 0.55;
    const [x0, y0] = project(...trail[i-1]);
    const [x1, y1] = project(...trail[i]);
    // Skip if too far (attractor jump) 
    if (Math.hypot(x1-x0, y1-y0) > Math.min(W,H)*0.15) continue;
    ctx.beginPath();
    ctx.strokeStyle = `hsla(${hue%360},80%,65%,${alpha})`;
    ctx.lineWidth = 1;
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
  }

  // Draw current point
  const [hx, hy] = project(px, py, pz);
  ctx.beginPath();
  ctx.arc(hx, hy, 2.5, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  frameCount++;
}

// Controls
document.getElementById('btnNext').addEventListener('click', () => {
  sysIdx = (sysIdx + 1) % SYSTEMS.length;
  resetSystem();
});
document.getElementById('btnPrev').addEventListener('click', () => {
  sysIdx = (sysIdx - 1 + SYSTEMS.length) % SYSTEMS.length;
  resetSystem();
});
document.getElementById('btnReset').addEventListener('click', resetSystem);
document.getElementById('btnRotate').addEventListener('click', function() {
  autoRotate = !autoRotate;
  this.classList.toggle('active', autoRotate);
  if (autoRotate) rotY = autoAngle;
});

// Pointer drag
let dragging = false, lastPX = 0, lastPY = 0;
c.addEventListener('pointerdown', e => {
  dragging = true;
  lastPX = e.clientX; lastPY = e.clientY;
  c.setPointerCapture(e.pointerId);
  if (autoRotate) { autoRotate = false; rotY = autoAngle; document.getElementById('btnRotate').classList.remove('active'); }
});
c.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastPX, dy = e.clientY - lastPY;
  rotY += dx * 0.005;
  rotX += dy * 0.005;
  rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, rotX));
  lastPX = e.clientX; lastPY = e.clientY;
});
c.addEventListener('pointerup', () => { dragging = false; });
c.addEventListener('pointercancel', () => { dragging = false; });

window.addEventListener('resize', () => { resize(); resetSystem(); });
function start() {
  resize();
  if (c.width === 0 || c.height === 0) { requestAnimationFrame(start); return; }
  resetSystem();
  frame();
}
requestAnimationFrame(start);
</script>
</body>
</html>
