<!DOCTYPE html>
<html lang="en">
<head>
<style>.back-btn,#back,#info,#ui,#mode-btn,#hud{display:none!important}</style>
<script>if(window.self===window.top)document.documentElement.classList.add('standalone')</script>
<style>html.standalone .back-btn,html.standalone #back,html.standalone #info,html.standalone #ui,html.standalone #mode-btn,html.standalone #hud{display:revert!important}</style>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"/>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3QgZmlsbD0iIzBhMGEwYSIgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIi8+CiAgPHBhdGggZD0iTTggOCBMMjQgOCBMMjQgMjQgTDggMjQgWiBNMTIgMTIgTDIwIDEyIEwyMCAyMCBMMTIgMjAgWiIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZTBlMGUwIiBzdHJva2Utd2lkdGg9IjEuNSIvPgo8L3N2Zz4K"/>
<title>Monte Carlo Pi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;height:100dvh;background:#070a0f;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.92);background:rgba(0,0,0,0.65);padding:8px 18px;border-radius:8px;font:13px/1.6 ui-monospace,monospace;pointer-events:none;text-align:center;min-width:240px;backdrop-filter:blur(6px)}
#hud .pi-val{font-size:1.5em;font-weight:700;letter-spacing:0.05em;color:#7ee8fa}
#hud .pi-err{font-size:0.75em;color:#aaa;margin-top:2px}
#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.55);padding:6px 12px;border-radius:6px;font:12px/1.4 ui-monospace,monospace;pointer-events:none;text-align:center}
.back-btn{position:fixed;top:max(16px, env(safe-area-inset-top));right:max(16px, env(safe-area-inset-right));background:rgba(20,20,20,0.8);border:1px solid #444;color:#e0e0e0;padding:8px 14px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;text-decoration:none;backdrop-filter:blur(8px);z-index:1000;transition:border-color 0.2s}
.back-btn:hover{border-color:#888}
</style>
</head>
<body>
<a href="./" class="back-btn">← Gallery</a>
<canvas id="c"></canvas>
<div id="hud">
  <div>π ≈ <span class="pi-val" id="pival">–</span></div>
  <div class="pi-err" id="pierr">waiting…</div>
</div>
<div id="info">Monte Carlo method · click to reset</div>
<script type="module">
import { mountMonteCarlo } from './_factories/montecarlo.js';

mountMonteCarlo({
  canvas: document.getElementById('c'),
  piValue: document.getElementById('pival'),
  piError: document.getElementById('pierr'),
});
</script>
</body>
</html>
