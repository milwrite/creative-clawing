<!DOCTYPE html>
<html lang="en">
<head>

<title>Snowflake</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;height:100dvh;background:#040810;overflow:hidden;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
body{display:flex;flex-direction:column}
canvas{display:block;width:100%;flex:1;min-height:0;touch-action:none}
#back{position:fixed;top:max(12px,env(safe-area-inset-top));left:max(12px,env(safe-area-inset-left));background:rgba(8,12,20,0.85);border:1px solid #1a3050;color:#8ab4d4;padding:8px 14px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;text-decoration:none;z-index:100;transition:border-color 0.2s}
#back:hover{border-color:#4a80a0;color:#c0ddf0}
#ui{
  flex-shrink:0;
  position:relative;bottom:auto;left:auto;transform:none;
  background:rgba(8,12,20,0.97);
  border-top:1px solid #1a3050;
  padding:8px max(env(safe-area-inset-right),12px) max(env(safe-area-inset-bottom),10px) max(env(safe-area-inset-left),12px);
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;
  z-index:100;font-size:12px;color:#8ab4d4
}
#ui label{display:flex;align-items:center;gap:6px;white-space:nowrap}
#ui input[type=range]{width:70px;accent-color:#5aafdd}
#ui button{background:rgba(90,175,221,0.15);border:1px solid #1a3050;color:#8ab4d4;padding:6px 14px;border-radius:4px;cursor:pointer;font:12px ui-monospace,monospace;transition:all 0.2s;min-height:36px;min-width:44px}
#ui button:hover{background:rgba(90,175,221,0.3);border-color:#4a80a0}
.val{min-width:32px;text-align:right;font-variant-numeric:tabular-nums;color:#5aafdd}
#info{position:fixed;top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);color:rgba(138,180,212,0.7);background:rgba(8,12,20,0.6);padding:6px 12px;border-radius:6px;font:11px/1.4 ui-monospace,monospace;pointer-events:none;text-align:center;white-space:nowrap;z-index:90}
#preset{background:rgba(90,175,221,0.15);border:1px solid #1a3050;color:#8ab4d4;border-radius:4px;padding:2px 6px;font:12px ui-monospace,monospace;cursor:pointer;min-height:36px}
@media(max-width:600px){
  #ui{gap:6px;padding-top:6px;padding-bottom:max(env(safe-area-inset-bottom),8px)}
  #ui input[type=range]{width:100px}
  #ui label{font-size:11px}
  .val{font-size:11px}
  #back{font-size:11px;padding:6px 10px}
}
</style>
</head>
<body>
<a id="back" href="./">← gallery</a>
<canvas id="c"></canvas>
<div id="info">Reiter's CA · hexagonal ice crystal growth</div>
<div id="ui">
  <label>β <input type="range" id="sliderB" min="0" max="0.95" step="0.01" value="0.35"><span class="val" id="valB">0.35</span></label>
  <label>γ <input type="range" id="sliderC" min="0.001" max="0.15" step="0.001" value="0.001"><span class="val" id="valC">0.001</span></label>
  <label>speed <input type="range" id="sliderSpd" min="1" max="50" step="1" value="10"><span class="val" id="valSpd">10</span></label>
  <select id="preset">
    <option value="dendrite">dendrite</option>
    <option value="stellar">stellar</option>
    <option value="plate">plate</option>
    <option value="sector">sector</option>
    <option value="fern">fern</option>
  </select>
  <button id="btnReset">reset</button>
  <span id="stepCount" style="color:#3a7aa0;font-size:11px">step 0</span>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const sliderB=document.getElementById('sliderB');
const sliderC=document.getElementById('sliderC');
const sliderSpd=document.getElementById('sliderSpd');
const valB=document.getElementById('valB');
const valC=document.getElementById('valC');
const valSpd=document.getElementById('valSpd');
const stepEl=document.getElementById('stepCount');
const presetEl=document.getElementById('preset');

/* ── Hex grid (offset coords, odd-r) ─────────────────────── */
const isMobile=('ontouchstart' in window)||window.innerWidth<600;
const N=isMobile?201:401; // smaller grid on mobile for perf
const CX=Math.floor(N/2), CY=Math.floor(N/2);
let grid, frozen, frozenStep, stepNum;
let paramB, paramC, stepsPerFrame;
let done=false;

const PRESETS={
  dendrite:  {b:0.35, c:0.001},
  stellar:   {b:0.50, c:0.003},
  plate:     {b:0.70, c:0.05},
  sector:    {b:0.60, c:0.02},
  fern:      {b:0.40, c:0.005},
};

function hexNeighbors(r,c){
  // Odd-r offset: even rows shift left, odd rows shift right
  if(r&1){
    return [[r-1,c],[r-1,c+1],[r,c-1],[r,c+1],[r+1,c],[r+1,c+1]];
  } else {
    return [[r-1,c-1],[r-1,c],[r,c-1],[r,c+1],[r+1,c-1],[r+1,c]];
  }
}

function init(){
  grid=new Float64Array(N*N);
  frozen=new Uint8Array(N*N);
  frozenStep=new Uint16Array(N*N);
  stepNum=0;
  done=false;

  paramB=parseFloat(sliderB.value);
  paramC=parseFloat(sliderC.value);
  stepsPerFrame=parseInt(sliderSpd.value);

  // Fill background vapor
  grid.fill(paramB);

  // Seed center
  const ci=CY*N+CX;
  grid[ci]=1.0;
  frozen[ci]=1;
  frozenStep[ci]=0;
}

function step(){
  if(done) return;

  // Build receptive mask: frozen cells + neighbors of frozen
  const receptive=new Uint8Array(N*N);
  for(let r=1;r<N-1;r++){
    for(let c=1;c<N-1;c++){
      const i=r*N+c;
      if(frozen[i]){receptive[i]=1;continue;}
      const nb=hexNeighbors(r,c);
      for(let k=0;k<6;k++){
        const nr=nb[k][0], nc=nb[k][1];
        if(nr>=0&&nr<N&&nc>=0&&nc<N&&frozen[nr*N+nc]){
          receptive[i]=1;break;
        }
      }
    }
  }

  // Diffusion on non-receptive; receptive cells contribute 0 to diffusion
  const newGrid=new Float64Array(N*N);
  for(let r=1;r<N-1;r++){
    for(let c=1;c<N-1;c++){
      const i=r*N+c;
      if(receptive[i]){
        // Receptive: add constant, keep own value
        newGrid[i]=grid[i]+paramC;
      } else {
        // Diffuse: average of non-receptive hex neighbors + self (weighted)
        const nb=hexNeighbors(r,c);
        let sum=0, cnt=0;
        for(let k=0;k<6;k++){
          const nr=nb[k][0], nc=nb[k][1];
          if(nr>=0&&nr<N&&nc>=0&&nc<N){
            // Receptive neighbors contribute 0
            if(!receptive[nr*N+nc]){
              sum+=grid[nr*N+nc]; cnt++;
            } else {
              cnt++; // count but add 0
            }
          }
        }
        // Weighted average: (self + avg_neighbors) / 2 ≈ diffusion
        newGrid[i]=(grid[i]+sum/Math.max(cnt,1))/2;
      }
    }
  }

  // Freeze newly ≥1 cells
  for(let r=1;r<N-1;r++){
    for(let c=1;c<N-1;c++){
      const i=r*N+c;
      if(!frozen[i]&&newGrid[i]>=1.0){
        frozen[i]=1;
        frozenStep[i]=stepNum;
      }
    }
  }

  // Check if crystal hit boundary (leave 5-cell margin)
  const margin=5;
  for(let r=0;r<N;r++){
    if(frozen[r*N+margin]||frozen[r*N+(N-1-margin)]){done=true;break;}
  }
  if(!done){
    for(let c=0;c<N;c++){
      if(frozen[margin*N+c]||frozen[(N-1-margin)*N+c]){done=true;break;}
    }
  }

  grid=newGrid;
  stepNum++;
}

/* ── Render ───────────────────────────────────────────────── */
let W,H,imgData,pxBuf;
const DPR=Math.min(devicePixelRatio||1,2);

function resize(){
  const rect=canvas.getBoundingClientRect();
  W=rect.width; H=rect.height;
  if(!W||!H) return;
  canvas.width=Math.round(W*DPR);
  canvas.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  imgData=null; // force re-create on next render
}

function iceColor(age, maxStep){
  // Age 0 (oldest) = deep blue center, newest = bright white tips
  const t=maxStep>0 ? age/maxStep : 0;
  // Deep blue → ice blue → cyan → white
  const r=Math.floor(40+215*t*t);
  const g=Math.floor(80+175*t);
  const b=Math.floor(140+115*t);
  return [Math.min(r,255),Math.min(g,255),Math.min(b,255)];
}

function render(){
  // Determine scale: fit N cells into viewport
  const cellSize=Math.min(W/N, H/N)*DPR;
  const imgW=canvas.width, imgH=canvas.height;

  ctx.setTransform(1,0,0,1,0,0);
  // Dark background
  ctx.fillStyle='#040810';
  ctx.fillRect(0,0,imgW,imgH);

  if(!imgData||imgData.width!==imgW||imgData.height!==imgH){
    imgData=ctx.createImageData(imgW,imgH);
  }
  const data=imgData.data;
  // Fill with background
  for(let i=0;i<data.length;i+=4){
    data[i]=4; data[i+1]=8; data[i+2]=16; data[i+3]=255;
  }

  const maxS=Math.max(stepNum,1);
  const offX=(imgW-N*cellSize)/2;
  const offY=(imgH-N*cellSize)/2;

  // Render each cell
  for(let r=0;r<N;r++){
    const rowOff=(r&1)?cellSize*0.5:0; // hex offset for odd rows
    for(let c=0;c<N;c++){
      const i=r*N+c;
      let cr,cg,cb;
      if(frozen[i]){
        [cr,cg,cb]=iceColor(frozenStep[i],maxS);
      } else {
        // Show vapor density faintly
        const v=grid[i];
        if(v>0.01){
          const intensity=Math.min(v/paramB,1)*0.15;
          cr=Math.floor(4+20*intensity);
          cg=Math.floor(8+30*intensity);
          cb=Math.floor(16+50*intensity);
        } else continue;
      }

      // Map cell to pixel region
      const px=Math.floor(offX+c*cellSize+rowOff);
      const py=Math.floor(offY+r*cellSize);
      const sz=Math.max(1,Math.ceil(cellSize));

      for(let dy=0;dy<sz&&(py+dy)<imgH;dy++){
        if(py+dy<0) continue;
        for(let dx=0;dx<sz&&(px+dx)<imgW;dx++){
          if(px+dx<0) continue;
          const pi=((py+dy)*imgW+(px+dx))*4;
          data[pi]=cr; data[pi+1]=cg; data[pi+2]=cb;
        }
      }
    }
  }

  ctx.putImageData(imgData,0,0);
  ctx.setTransform(DPR,0,0,DPR,0,0);

  stepEl.textContent='step '+stepNum;
}

/* ── Animation loop ────────────────────────────────────────── */
function frame(){
  for(let i=0;i<stepsPerFrame;i++) step();
  render();
  requestAnimationFrame(frame);
}

/* ── Controls ──────────────────────────────────────────────── */
sliderB.addEventListener('input',()=>{
  paramB=parseFloat(sliderB.value);
  valB.textContent=paramB.toFixed(2);
});
sliderC.addEventListener('input',()=>{
  paramC=parseFloat(sliderC.value);
  valC.textContent=paramC.toFixed(3);
});
sliderSpd.addEventListener('input',()=>{
  stepsPerFrame=parseInt(sliderSpd.value);
  valSpd.textContent=stepsPerFrame;
});

presetEl.addEventListener('change',()=>{
  const p=PRESETS[presetEl.value];
  if(!p) return;
  sliderB.value=p.b; paramB=p.b; valB.textContent=p.b.toFixed(2);
  sliderC.value=p.c; paramC=p.c; valC.textContent=p.c.toFixed(3);
  init();
});

document.getElementById('btnReset').addEventListener('click',init);

window.addEventListener('resize',resize);
if(window.visualViewport)window.visualViewport.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>requestAnimationFrame(resize));

/* ── Init ──────────────────────────────────────────────────── */
requestAnimationFrame(()=>{
  resize();
  init();
  // In iframe: fast-forward so the crystal is already partially grown on first paint
  if(window.self!==window.top){
    for(let i=0;i<800;i++) step();
  }
  frame();
});
</script>
</body>
</html>
