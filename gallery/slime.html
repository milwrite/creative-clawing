<title>Slime Mold</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;height:100dvh;background:#050505;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}
#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.8);background:rgba(0,0,0,0.6);padding:6px 14px;border-radius:6px;font:12px/1.5 ui-monospace,monospace;pointer-events:none;text-align:center}
.back-btn{position:fixed;top:max(16px, env(safe-area-inset-top));right:max(16px, env(safe-area-inset-right));background:rgba(20,20,20,0.8);border:1px solid #444;color:#e0e0e0;padding:8px 14px;border-radius:6px;font:12px ui-monospace,monospace;cursor:pointer;text-decoration:none;backdrop-filter:blur(8px);z-index:1000;transition:border-color 0.2s}
.back-btn:hover{border-color:#888}
#ui{position:fixed;top:16px;left:16px;display:flex;flex-direction:column;gap:8px}
.btn{background:rgba(20,20,20,0.8);border:1px solid #444;color:#e0e0e0;padding:6px 12px;border-radius:6px;font:11px ui-monospace,monospace;cursor:pointer;transition:border-color 0.2s}
.btn:hover{border-color:#888}
</style>
</head>
<body>
<a href="./" class="back-btn">← Gallery</a>
<div id="ui">
  <button class="btn" id="resetBtn">Reset</button>
  <button class="btn" id="modeBtn">Sensor: 3</button>
</div>
<canvas id="c"></canvas>
<div id="info">Slime Mold · click to add food · organisms find paths through trails</div>
<script>
if(window.self!==window.top){
  document.querySelectorAll('.back-btn,#info,#ui').forEach(el=>el.style.display='none');
}

const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H,imgData;

// Trail map (pheromone field)
let trail;
let trailDecay=0.97;

// Agents
const agents=[];
const AGENT_COUNT=4000;
let sensorAngle=Math.PI/4;
let sensorDist=12;
let turnSpeed=0.3;
let moveSpeed=1.2;
let sensorSize=1;

class Agent{
  constructor(){
    this.x=Math.random()*W;
    this.y=Math.random()*H;
    this.angle=Math.random()*Math.PI*2;
    this.speed=moveSpeed*(0.9+Math.random()*0.2);
  }

  sense(offset){
    const sx=(this.x+Math.cos(this.angle+offset)*sensorDist)|0;
    const sy=(this.y+Math.sin(this.angle+offset)*sensorDist)|0;
    if(sx<0||sx>=W||sy<0||sy>=H)return 0;
    // Sample a small kernel
    let sum=0;
    for(let dy=-sensorSize;dy<=sensorSize;dy++){
      for(let dx=-sensorSize;dx<=sensorSize;dx++){
        const x=sx+dx,y=sy+dy;
        if(x>=0&&x<W&&y>=0&&y<H)sum+=trail[(y*W+x)*4];
      }
    }
    return sum;
  }

  step(){
    // Sense left, center, right
    const sl=this.sense(-sensorAngle);
    const sf=this.sense(0);
    const sr=this.sense(sensorAngle);

    // Decision: steer toward highest concentration
    if(sf>sl&&sf>sr){
      // Continue straight with slight wander
      this.angle+=(Math.random()-0.5)*0.1;
    }else if(sf<sl&&sf<sr){
      // Both sides stronger: pick randomly
      this.angle+=(Math.random()<0.5?1:-1)*turnSpeed;
    }else if(sl>sr){
      this.angle-=turnSpeed;
    }else if(sr>sl){
      this.angle+=turnSpeed;
    }

    // Move
    const nx=this.x+Math.cos(this.angle)*this.speed;
    const ny=this.y+Math.sin(this.angle)*this.speed;

    // Boundary wrap
    if(nx<0||nx>=W||ny<0||ny>=H){
      this.angle=Math.random()*Math.PI*2;
    }else{
      this.x=nx;this.y=ny;
    }

    // Deposit trail
    const ix=(this.x|0),iy=(this.y|0);
    if(ix>=0&&ix<W&&iy>=0&&iy<H){
      const idx=(iy*W+ix)*4;
      trail[idx]=Math.min(255,trail[idx]+40);
      trail[idx+1]=Math.min(255,trail[idx+1]+30);
      trail[idx+2]=Math.min(255,trail[idx+2]+60);
    }
  }
}

// Food sources attract agents
const foods=[];
class Food{
  constructor(x,y){
    this.x=x;this.y=y;
    this.radius=40;
    this.strength=200;
  }

  deposit(){
    const r=this.radius|0;
    for(let dy=-r;dy<=r;dy++){
      for(let dx=-r;dx<=r;dx++){
        const x=(this.x+dx)|0,y=(this.y+dy)|0;
        if(x>=0&&x<W&&y>=0&&y<H&&dx*dx+dy*dy<=r*r){
          const idx=(y*W+x)*4;
          const falloff=1-Math.sqrt(dx*dx+dy*dy)/r;
          const val=this.strength*falloff;
          trail[idx]=Math.min(255,trail[idx]+val);
          trail[idx+1]=Math.min(255,trail[idx+1]+val*0.3);
          trail[idx+2]=Math.min(255,trail[idx+2]+val*0.1);
        }
      }
    }
  }
}

function init(){
  W=c.width=c.clientWidth||innerWidth;
  H=c.height=c.clientHeight||innerHeight;
  imgData=ctx.createImageData(W,H);
  trail=new Uint8ClampedArray(W*H*4);

  // Clear to black
  for(let i=3;i<trail.length;i+=4)trail[i]=255;

  // Init agents
  agents.length=0;
  for(let i=0;i<AGENT_COUNT;i++)agents.push(new Agent());

  // Scatter initial food
  foods.length=0;
  const count=Math.max(2,Math.floor((W*H)/(800*600)*5));
  for(let i=0;i<count;i++){
    foods.push(new Food(Math.random()*W*0.8+W*0.1,Math.random()*H*0.8+H*0.1));
  }
}

function blurTrail(){
  const tmp=new Uint8ClampedArray(trail);
  for(let y=1;y<H-1;y++){
    for(let x=1;x<W-1;x++){
      const idx=(y*W+x)*4;
      for(let c=0;c<3;c++){
        let sum=tmp[idx+c]*0.5+
                tmp[idx-4+c]*0.125+
                tmp[idx+4+c]*0.125+
                tmp[(y-1)*W*4+idx+c]*0.125+
                tmp[(y+1)*W*4+idx+c]*0.125;
        trail[idx+c]=sum*trailDecay;
      }
    }
  }
}

function render(){
  imgData.data.set(trail);
  ctx.putImageData(imgData,0,0);
}

let tick=0;
function loop(){
  requestAnimationFrame(loop);

  for(const agent of agents)agent.step();

  // Food continuously deposits attractant
  if(tick%10===0){
    for(const food of foods)food.deposit();
  }

  // Decay trails
  if(tick%3===0)blurTrail();

  // Occasional new food
  if(tick%600===0&&foods.length<8){
    foods.push(new Food(Math.random()*W*0.8+W*0.1,Math.random()*H*0.8+H*0.1));
  }

  render();
  tick++;
}

// Controls
let sensorMode=3;
document.getElementById('resetBtn').addEventListener('click',init);
document.getElementById('modeBtn').addEventListener('click',(e)=>{
  sensorMode=sensorMode===3?5:sensorMode===5?7:3;
  e.target.textContent=`Sensor: ${sensorMode}`;
  if(sensorMode===3){
    sensorAngle=Math.PI/4;sensorDist=12;
  }else if(sensorMode===5){
    sensorAngle=Math.PI/6;sensorDist=16;
  }else{
    sensorAngle=Math.PI/8;sensorDist=20;
  }
});

// Input
c.addEventListener('click',e=>{
  foods.push(new Food(e.clientX,e.clientY));
});

c.addEventListener('touchstart',e=>{e.preventDefault()},{passive:false});
c.addEventListener('touchend',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  foods.push(new Food(t.clientX,t.clientY));
},{passive:false});

window.addEventListener('resize',()=>{
  // Preserve trail when resizing
  const oldW=W,oldH=H;
  const oldTrail=trail;
  W=c.width=c.clientWidth||innerWidth;H=c.height=c.clientHeight||innerHeight;
  imgData=ctx.createImageData(W,H);
  trail=new Uint8ClampedArray(W*H*4);
  for(let i=3;i<trail.length;i+=4)trail[i]=255;
  // Copy old data
  const minW=Math.min(W,oldW),minH=Math.min(H,oldH);
  for(let y=0;y<minH;y++){
    for(let x=0;x<minW;x++){
      const oldIdx=(y*oldW+x)*4;
      const newIdx=(y*W+x)*4;
      trail[newIdx]=oldTrail[oldIdx];
      trail[newIdx+1]=oldTrail[oldIdx+1];
      trail[newIdx+2]=oldTrail[oldIdx+2];
    }
  }
});

if(window.visualViewport)window.visualViewport.addEventListener('resize',()=>{init();});
window.addEventListener('orientationchange',()=>{setTimeout(init,200);});
requestAnimationFrame(()=>{init();setTimeout(init,200);loop();});
</script>
</body>
</html>
