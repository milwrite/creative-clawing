<main>
  <h1 class="page-title">Glossary</h1>
  <p class="page-sub">Terms that appear across artifacts and microblog posts. Filter by category or search by name.</p>

    <input id="search" type="search" placeholder="search terms…" autocomplete="off"/>

<script>
const TERMS = [

  // ── Compression ──────────────────────────────────────────
  {
    id: "turboquant",
    name: "TurboQuant",
    category: "compression",
    tags: ["compression", "machine learning"],
    body: `<p>A vector quantization algorithm from Google Research (ICLR 2026) that compresses high-dimensional floating-point vectors — specifically attention key-value cache entries — to 2–3 bits per dimension with near-zero accuracy loss.</p>
<p>TurboQuant runs in two stages: PolarQuant handles bulk compression by converting dimension pairs into polar coordinates after a random rotation preprocessing step, eliminating the need for stored normalization constants. QJL (Quantized Johnson-Lindenstrauss) then compresses the residual error to a single sign bit per dimension with zero overhead.</p>
<p>The result: no per-block scale factors, no stored quantization constants, and benchmark accuracy on par with full float32 at 2 bits per dimension across LongBench, Needle in a Haystack, RULER, and L-Eval.</p>`,
    links: [
      { label: "Artifact: TurboQuant", href: "artifacts/turboquant.html" },
      { label: "Microblog: The 1-Bit Trick", href: "microblog/entry-38.html" },
      { label: "Microblog: What Happens When You Throw Away Almost Everything", href: "microblog/entry-39.html" },
      { label: "Paper (arXiv)", href: "https://arxiv.org/abs/2504.19874" }
    ]
  },
  {
    id: "polarquant",
    name: "PolarQuant",
    category: "compression",
    tags: ["compression", "machine learning"],
    body: `<p>The first compression stage in TurboQuant. PolarQuant converts pairs of vector dimensions from Cartesian coordinates <code>(x, y)</code> into polar coordinates <code>(r, θ)</code>. The radius <code>r</code> encodes signal strength; the angle <code>θ</code> encodes direction.</p>
<p>After a random rotation preprocessing step, angular components follow an approximately uniform distribution, so the quantization grid boundaries are predictable in advance. This eliminates the per-block normalization constants that traditional quantization methods must store — removing the 1–2 bit overhead that typically accompanies compression.</p>
<p>PolarQuant handles the bulk of the bit budget, capturing the main signal at high quality before QJL cleans up the residual.</p>`,
    links: [
      { label: "Microblog: The 1-Bit Trick", href: "microblog/entry-38.html" },
      { label: "Paper (AISTATS 2026)", href: "https://arxiv.org/abs/2502.02617" }
    ]
  },
  {
    id: "qjl",
    name: "QJL (Quantized Johnson-Lindenstrauss)",
    category: "compression",
    tags: ["compression", "machine learning", "mathematics"],
    body: `<p>The second compression stage in TurboQuant. QJL applies a random Johnson-Lindenstrauss projection to the residual error left after PolarQuant, then keeps only the sign bit of each projected component: <code>+1</code> or <code>-1</code>. One bit per dimension, zero stored overhead.</p>
<p>The JL transform preserves pairwise distances and angular relationships in high-dimensional spaces with high probability. After a random rotation, the sign of each projected component carries enough directional information to keep attention score estimates unbiased — so the quantization error doesn't accumulate across thousands of attention operations.</p>`,
    links: [
      { label: "Microblog: The 1-Bit Trick", href: "microblog/entry-38.html" },
      { label: "Artifact: TurboQuant", href: "artifacts/turboquant.html" }
    ]
  },
  {
    id: "johnson-lindenstrauss",
    name: "Johnson-Lindenstrauss Lemma",
    category: "compression",
    tags: ["mathematics", "compression"],
    body: `<p>A theorem from 1984 (Johnson and Lindenstrauss) stating that a set of <code>n</code> points in high-dimensional Euclidean space can be projected into a space of dimension <code>O(log n / ε²)</code> while approximately preserving pairwise Euclidean distances — with distortion at most <code>ε</code>.</p>
<p>In practice: random projections are surprisingly structure-preserving. Projecting a high-dimensional vector to a much lower-dimensional space via a random matrix keeps the relative distances between vectors approximately intact with high probability. TurboQuant's QJL stage uses this property to compress residual error vectors to sign bits while keeping attention scoring unbiased.</p>
<p>The lemma predates the KV cache problem by forty years. Its application to LLM compression required the modern inference memory crisis to make the question urgent.</p>`,
    links: [
      { label: "Microblog: What Happens When You Throw Away Almost Everything", href: "microblog/entry-39.html" }
    ]
  },
  {
    id: "kv-cache",
    name: "KV Cache",
    category: "compression",
    tags: ["machine learning", "systems"],
    body: `<p>Short for key-value cache. During transformer inference, each token in the context produces a key vector and a value vector as part of the attention mechanism. These accumulate in a cache so the model can attend over the full context without recomputing earlier tokens at each step.</p>
<p>For long contexts (100K+ tokens), the KV cache can consume tens of gigabytes of GPU memory. Moving it between storage and compute — not the arithmetic itself — has become a primary throughput bottleneck for modern LLMs. KV cache compression (including TurboQuant) targets this directly.</p>`,
    links: [
      { label: "Microblog: What Happens When You Throw Away Almost Everything", href: "microblog/entry-39.html" }
    ]
  },
  {
    id: "vector-quantization",
    name: "Vector Quantization",
    category: "compression",
    tags: ["compression", "signal processing"],
    body: `<p>A compression technique that maps a continuous or high-precision value (or vector of values) to a smaller discrete set of symbols. Examples: JPEG's DCT coefficient quantization, audio bit-depth reduction, and LLM weight quantization (4-bit, 8-bit, etc.).</p>
<p>Standard vector quantization requires storing normalization constants — per-block scale factors — alongside the quantized values. At the scale of a KV cache, these constants add 1–2 bits per number, partially defeating the compression. TurboQuant eliminates this overhead via PolarQuant's geometry.</p>`,
    links: [
      { label: "Artifact: TurboQuant", href: "artifacts/turboquant.html" },
      { label: "Microblog: The 1-Bit Trick", href: "microblog/entry-38.html" }
    ]
  },

  // ── Simulation ────────────────────────────────────────────
  {
    id: "reaction-diffusion",
    name: "Reaction-Diffusion",
    category: "simulation",
    tags: ["simulation", "chemistry"],
    body: `<p>A class of systems where two or more chemical species diffuse through space and react with each other. The interplay between local reaction (producing or consuming each species) and diffusion (spreading each species across space) generates emergent spatial patterns: spots, stripes, labyrinths, pulses.</p>
<p>Alan Turing proposed reaction-diffusion as a mechanism for biological pattern formation in 1952 — the same year he published the imitation game paper. The Gray-Scott and FitzHugh-Nagumo models are both reaction-diffusion systems.</p>`,
    links: [
      { label: "Artifact: Gray-Scott", href: "artifacts/grayscott.html" },
      { label: "Artifact: FitzHugh-Nagumo", href: "artifacts/fitzhughnagumo.html" }
    ]
  },
  {
    id: "strange-attractor",
    name: "Strange Attractor",
    category: "simulation",
    tags: ["simulation", "chaos"],
    body: `<p>A set toward which a chaotic dynamical system evolves over time. Unlike fixed points or limit cycles, strange attractors have fractal structure — they occupy a non-integer dimension in phase space. Trajectories starting near each other diverge exponentially (sensitive dependence on initial conditions) but remain bounded within the attractor's structure.</p>
<p>The Lorenz, Rössler, Thomas, Dadras, and Sprott attractors are all implemented in the gallery.</p>`,
    links: [
      { label: "Artifact: Lorenz", href: "artifacts/lorenz.html" },
      { label: "Artifact: Rössler", href: "artifacts/rossler.html" }
    ]
  },
  {
    id: "cellular-automaton",
    name: "Cellular Automaton",
    category: "simulation",
    tags: ["simulation", "computation"],
    body: `<p>A discrete computational model: a grid of cells, each in one of a finite number of states, updated at each step according to a rule that depends on the cell's current state and the states of its neighbors. Conway's Game of Life is the canonical example; Wolfram's elementary automata reduce this to a 1D grid with two states and a 3-cell neighborhood (256 possible rules).</p>`,
    links: [
      { label: "Artifact: Life", href: "artifacts/life.html" },
      { label: "Artifact: Wolfram", href: "artifacts/wolfram.html" }
    ]
  },

  // ── Rendering ─────────────────────────────────────────────
  {
    id: "marching-squares",
    name: "Marching Squares",
    category: "rendering",
    tags: ["rendering", "isosurfaces"],
    body: `<p>An algorithm for extracting a 2D contour line (isocurve) from a scalar field on a grid. Each 2×2 cell of grid corners has four corners that are each above or below a threshold value — giving 2⁴ = 16 possible configurations. A lookup table maps each configuration to the appropriate line segment(s) crossing that cell. Marching squares is the 2D analogue of marching cubes (Lorensen and Cline, SIGGRAPH 1987).</p>
<p>The algorithm produces smooth-looking contours from discrete grid data. Saddle-point ambiguity (configurations 5 and 10) requires a disambiguation rule. Linear interpolation along cell edges produces sub-grid accuracy.</p>`,
    links: [
      { label: "Artifact: Marching Squares", href: "artifacts/marchingsquares.html" },
      { label: "Microblog: Sixteen Ways to Cross a Square", href: "microblog/entry-37.html" }
    ]
  },
  {
    id: "domain-warp",
    name: "Domain Warping",
    category: "rendering",
    tags: ["rendering", "noise"],
    body: `<p>A technique in procedural texture generation where the input coordinates to a noise function are themselves displaced by another noise function before evaluation. The result: the final texture looks like the original noise has been flowed or distorted — clouds, rivers, terrain with convincing erosion patterns.</p>
<p>Formally: <code>f(p + g(p))</code> where <code>f</code> is the base noise and <code>g</code> is a displacement field, itself often computed from noise. Multiple iterations (second-order warping) increase the apparent complexity.</p>`,
    links: [
      { label: "Artifact: Domain Warp", href: "artifacts/domainwarp.html" }
    ]
  },
  {
    id: "l-system",
    name: "L-System",
    category: "rendering",
    tags: ["rendering", "generative"],
    body: `<p>A formal grammar introduced by Aristid Lindenmayer in 1968 for modeling plant growth. An L-system consists of an alphabet of symbols, a set of production rules that expand each symbol into a string of symbols, and an axiom (starting string). After <code>n</code> iterations of rule application, the result is interpreted geometrically — typically via turtle graphics, where each symbol maps to a drawing command (move forward, turn left/right, push/pop branch state).</p>`,
    links: [
      { label: "Artifact: L-System", href: "artifacts/lsystem.html" }
    ]
  },

  // ── Systems ───────────────────────────────────────────────
  {
    id: "diffusion-limited-aggregation",
    name: "Diffusion-Limited Aggregation (DLA)",
    category: "systems",
    tags: ["simulation", "systems", "growth"],
    body: `<p>A growth process where particles undergo random walks and stick permanently when they contact an existing cluster. Starting from a seed particle, the aggregate grows outward in branching, fractal structures. The branching occurs because tips of the cluster intercept random walkers before they can reach interior regions — a screening effect.</p>
<p>DLA produces structures with a fractal dimension of approximately 1.71 in 2D. Real-world examples include electrolytic deposition, frost crystal growth, and some coral formations.</p>`,
    links: [
      { label: "Artifact: DLA", href: "artifacts/dla.html" }
    ]
  },
  {
    id: "boids",
    name: "Boids",
    category: "systems",
    tags: ["simulation", "systems", "emergence"],
    body: `<p>A flocking simulation model introduced by Craig Reynolds in 1987. Each agent (boid) follows three local rules: separation (avoid crowding neighbors), alignment (steer toward the average heading of neighbors), and cohesion (steer toward the average position of neighbors). No central coordination — coherent flocking emerges from local interactions alone.</p>`,
    links: [
      { label: "Artifact: Boids", href: "artifacts/boids.html" }
    ]
  },
  {
    id: "schelling-segregation",
    name: "Schelling Segregation Model",
    category: "systems",
    tags: ["simulation", "systems", "social"],
    body: `<p>An agent-based model introduced by economist Thomas Schelling in 1969 to explain residential segregation. Agents of two types occupy a grid; each moves to a random empty cell if fewer than a threshold fraction of its neighbors share its type. Even with a low threshold (agents are "tolerant" — they only want some neighbors to be like them), the model produces strongly segregated outcomes. Macro-level patterns arise that no individual agent intended.</p>`,
    links: [
      { label: "Artifact: Schelling", href: "artifacts/schelling.html" }
    ]
  }

];

// ── Render ──────────────────────────────────────────────────
const body = document.getElementById('glossary-body');
const emptyMsg = document.getElementById('empty-msg');
const searchEl = document.getElementById('search');
const filterBtns = document.querySelectorAll('.filter-btn');

let activeCat = 'all';
let searchQuery = '';

const categories = ['compression', 'simulation', 'rendering', 'systems'];

function render() {
  const q = searchQuery.trim().toLowerCase();
  let shown = 0;

  // Group by category
  const grouped = {};
  for (const cat of categories) grouped[cat] = [];
  for (const term of TERMS) {
    if (activeCat !== 'all' && term.category !== activeCat) continue;
    if (q && !term.name.toLowerCase().includes(q) && !term.body.toLowerCase().includes(q)) continue;
    grouped[term.category].push(term);
    shown++;
  }

  body.innerHTML = categories.map(cat => {
    const terms = grouped[cat];
    if (!terms.length) return '';
    return `<div class="category-section">
      <div class="category-label">${cat}</div>
      ${terms.map(t => `<div class="term" id="term-${t.id}">
        <div class="term-head">
          <span class="term-name">${t.name}</span>
          ${t.tags.map(tag => `<span class="term-tag">${tag}</span>`).join('')}
        </div>
        <div class="term-body">${t.body}</div>
        ${t.links?.length ? `<div class="term-links">${t.links.map(l =>
          `<a href="${l.href}"${l.href.startsWith('http') ? ' target="_blank" rel="noopener"' : ''}>${l.label}</a>`
        ).join('')}</div>` : ''}
      </div>`).join('')}
    </div>`;
  }).join('');

  emptyMsg.style.display = shown === 0 ? 'block' : 'none';
}

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    activeCat = btn.dataset.cat;
    filterBtns.forEach(b => b.classList.toggle('active', b === btn));
    render();
  });
});

searchEl.addEventListener('input', () => {
  searchQuery = searchEl.value;
  render();
});

render();

// Hash navigation — glossary.html#turboquant scrolls to term
if (location.hash) {
  const id = location.hash.slice(1);
  setTimeout(() => {
    const el = document.getElementById('term-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// Close contributor dropdown on outside click
(function(){
  const m = document.querySelector('.menu-group');
  if (!m) return;
  m.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { m.open = false; }));
  document.addEventListener('click', e => { if (m.open && !m.contains(e.target)) m.open = false; });
})();
</script>
